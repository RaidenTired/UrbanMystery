text:`林夜没有立刻出门。他把手机放在桌上，盯着那个已注销的号码看了十秒——然后他拿起雨衣，没有去码头，而是去了另一个方向。

江城晚报社。

深夜十一点，报社只有值夜班的校对组还在。林夜用钥匙打开档案室的门——一股旧报纸特有的油墨味扑面而来。档案室不大，大约二十平方米，铁架子上按年份码着牛皮纸档案袋。墙上挂着一面褪色的锦旗：「江城新闻奖·2008年度最佳调查报道」——那是老刘年轻时的功绩，也是他现在每天挂在嘴边的那句"别惹麻烦"的反面教材。

林夜没有开大灯。他用手机的手电筒照着架子上的标签：2018、2019、2020……一直翻到2023年的那一格。他的手停住了——那个档案袋的封口处贴着一张便利贴，上面用老刘的字迹写着：「未结案——保留」。

他把名单折好放进雨衣内层——这个动作老刘看在眼里，什么也没说。只是在林夜走出档案室的时候，老刘追了一句：「小子，别逞英雄。逞英雄的都躺在地下了。」

雨还在下。但林夜已经决定——他要去那个仓库。不是去逞英雄。是去把那个电话、那份名单、那句"镜子里的不是人"，拼成一整幅画。`,

title:"夜行",
npc:"旁白",
text:`林夜放下电话之后，在出租屋里坐了整整十五分钟。

他的房间很小——一张单人床、一张书桌、一个从二手市场淘来的三层铁皮书架。书架上塞满了社会调查类的书:《沉默的真相》《江城黑档案》《失踪者——中国式消失》。这些都是他大学毕业后三年里读过的书——每一本都关于一个被遗忘的、被掩盖的、或者被沉默的事件。

他看着窗外。暴雨下了第二场，雨滴打在铁皮雨棚上，发出密集的、像机关枪扫射一样的声音。凌晨三点零七分——这个时候的江城街道上已经没有人了。只有路灯，在雨水里拉出长长的、抖动着的橙色倒影。

他按下了录音笔的播放键。刚才通话时他录了音——这是记者职业训练的一部分，任何匿名线索的第一反应永远是记录。

那个女人的声音从扬声器里传出来。他第一次认真听——不是听内容，是听细节。她的呼吸声不均匀——每说一句话之后有一声极细小的、像是有液体在喉咙里滚动的声响。那不是正常人的声带振动模式——更像是受过某种物理创伤之后声带再生的痕迹。

「……你的左手手腕上有一道三厘米的疤。」

林夜低头看着自己的左手。那道疤在虎口上方——三厘米，淡白色，十七岁那年冬天从楼梯上摔下来缝了五针。这道疤在任何公开照片上都看不到——他从来不拍左手特写。知道他这道疤的人，不超过六个。

这个人不是陌生人。

「——如果你想知道真相，到旧码头的三号仓库来。」

真相。他上一次听到这个词还是三个月前——在报社编辑部的讨论会议上，他提出了一个被老刘以「时机不对」为由拒绝的调查选题。那个选题的标题是：「江城市的失踪者——为什么没有人找他们？」。选题被否决之后，他把它存档到了个人硬盘里，再也没有打开过。

但现在那个选题主动找到了他。

林夜站起来，从衣架上取下那件已经穿了三年、防水层已经开始老化的灰蓝色雨衣。他拉开书桌最下面的抽屉——里面是一台二手单反相机、一只小型录音笔、以及一把在夜市上花三十块钱买的瑞士军刀。他把这些全部塞进了雨衣的内层口袋。然后他走出门，走下六层没有电梯的楼梯，走进了暴雨中。`,
choices:[{text:"「翻过铁丝网，进入旧码头区」",next:"node_3",clue:null}],

title:"号码追踪",
npc:"旁白",
text:`林夜没有立刻去旧码头。他先把那个三十一秒的陌生座机号码写在一张便签纸上——贴在电脑显示器旁边。然后他打开电脑，进入了报社的内部通讯查询界面——一个需要输入授权码才能使用的数据库工具，老刘在上个月交给了他授权码。

输入旧码头区的区号。查询——返回了十七个在该区域已经被撤销但仍然在数据库中有记录的编号。其中只有一个编号的注销日期是昨天晚上——也就是在他接到那通电话的大约同一个时间窗口内。

这个号码的登记人是——联合公用电话服务提供商，登记地址是旧码头区西门街88号。

他立刻骑上摩托车去了西门街。凌晨四点，这条已经废弃的街道上只有一盏闪个不停的老式街灯。88号是一座废弃的便利店——铁卷帘被拉下一半，上面锈迹斑斑。便利店里面——在布满灰尘和破碎的塑料袋的地板上——有一部公共付费电话，座机还亮着一盏微弱的电源指示灯。

有人在这里——在过去几个小时内——用这部被遗忘在废墟里的公共电话打了一通只有三十一秒的报警电话。

林夜拍下了公用电话的照片，拍了它在废弃便利店里的位置，拍了整座破败的便利店。他回来之后打电话给苏晚——苏晚告诉他，技术部门查了通话记录之后发现：这个号码在今天凌晨一点十四分拨出了一个通话——但通话的另一端号码并不是林夜的手机。是他的号码被这部公共电话的自动转接功能重定向了。

这个来电者用了某种转接软件——让她的通话从一个公共电话出发，跳到另一个号码，再跳到林夜的手机上——一共跳了三次。每一次跳跃都消耗一到两秒的延迟。所以那个电话里，她的声音听起来有一点切断的、节奏不均匀的能量。

「这种转接技术——普通人能搞到吗？」林夜问苏晚。

「可以。所有会使用网络安全基础隐匿技术的人都可以。但这种绕过三重跳转的转接——她要么是职业人，要么有职业人帮她。她不是普通的爆料者——她是个有备而来的人。」

林夜放下电话，站在出租屋的窗前。他低头看着手机屏幕上那个已经变成空号的号码——然后他把它存在了通讯录里。联系人名字写的是：「电话里的女人」。

他不会删掉这个号码。因为它虽然永远也无法再被接听——但它曾经在三十一秒之内，把一个选择完全颠倒了他今晚的原来计划的信号传输到了他的耳朵里。`,

"node_3":{
title:"旧码头三号仓库",
npc:"旁白",
text:`凌晨四点半——雨还在下——林夜的摩托车停在旧码头区的围栏边。围栏的锁芯已经被人用角磨机削掉了——粗糙的金属断面在摩托车的车灯光中反射出一线不连续的亮光。

他用雨衣袖子擦了擦额头上的汗水和雨水的混合物，然后推开了那道锁已经被削掉的铁门。

三号仓库——一座已经被废弃了至少十五年的老旧建筑——在黑暗中显露出了它的轮廓。外墙上贴着几层已经开始从水泥基层脱落的褪色集装箱面板，地面积了一层将近膝盖的积水。但他脚下的路——在仓库内壁上堆放着的旧集装箱下方，紧贴着墙角有一条干燥的窄路——是被踩出来了。

方远的密码管图中有写：「三仓——沿集装箱下走道向北大概走六十步，找到墙上的黄X。黄×后方墙体为石膏板——可打穿。打穿之后进入旧码头的废弃管道接入层——从这里能爬到'镜中人'的地下货梯井。」

他在手电筒的晃动的光线中找到了那个黄色标记——不是X，是一个已经退了颜色的维他命胶囊的黄色油漆标记。有人在他之前到过这里——不是方远，是一个比他更早来的人。

苏晚。

杨木板被苏晚用警棍的一端打碎了一半——她做的时候时间不够，只打开了上半部分，刚好够一个女人的肩膀和头挤过去。林夜把剩下的木板踢开——石膏板的粉末扬起来，在帽灯的光束中像一层细薄的雪。

他爬了进去。管道里又湿又滑又幽闭——高度只有七十厘米左右，超过人体躯干的厚度，每一次匍匐前进都会让背部和管壁上黏腻的冷凝水做一次不情愿的亲密接触。他在方远的图上看到这段爬行距离标注的是「~180m」。180米——正常情况下走路只要两分钟——但在这条管道里，每一米都是在用身体摩擦铁锈前行。

管道尽头——货梯井。

井道的侧壁上挂着一把垂下来的消防管道——苏晚放的。她在从上面下去之后把消防管道的上端固定在横梁上，方便他跟着下来。管子上用粉笔写着一行小字：「梯子。慢点——小心。我在B层等你。」

林夜握紧消防管道，把身体的重量一分一毫地压上去测试稳固度——然后一步一步从井道侧壁下降。在下降的过程中他经历了暗黑中最独特的那种感觉——被无光和极度狭窄的空间包裹着，唯一可以被感知到的不是视觉对象——是他自己心脏的跳动。

他用脚碰到了B层的防火门平台的金属踏板。然后他推开门——在黑暗的地下通道的另一端，有一道光——是手电筒，苏晚的手电筒。

他朝那道光走过去——在走到足够近到可以看清她的脸的瞬间，苏晚的嘴唇动了一下，没有声音，但她把手中一张折成了小方块的纸递给了他。纸上是她从被撞开的囚室中找到的一张方远遗留的B区详细管道图——图上标注着六个巡逻换班点，以及每一个在今晚的夜班期间有遗漏可能的保安。

他没有回答——只是把她递过来的管道图小心翼翼地折进口袋里，然后抬头看着这间地下密室。在这条仅用手电筒微弱点光照亮的黑暗走廊里——两个从不认识彼此、却被同一条失踪线索引到了同一个地下入口的人——面对面地，在今晚的凌晨——开始了长达三个小时的并肩潜行。`,

title:"苏晚",
npc:"苏晚",
text:`苏晚在警局门口等他。

凌晨四点半，东边的天际线刚刚泛起一层灰蓝色的、还没完全醒来的光。空气里残留着暴雨之后的泥土味——潮湿的、厚重的，混杂着街道上积水蒸发之后留下的淡淡的臭氧气息。

她穿着一件深色的警用夹克——不是制服，是便衣刑警常穿的那种没有任何标识的黑色外套。头发简单地扎在脑后，露出的面部没有化妆——连粉底都没有。但正是这种不施粉黛的坦荡让她看起来比任何精心打扮的女人都更有力量感——那是一种知道自己要面对什么、并且已经做好了准备的人才会有的表情。

「林夜。」她的声音比他想象中的要低——不是女人刻意压低的那种做作的、充满暗示的低，而是被长期失眠和在暗处跟踪嫌疑人磨砺出来的功能性的低沉。

「苏晚刑警。」他握住了她伸过来的手。她的手比他的还要粗糙——手掌上有几道硬茧，是指关节的位置。那是长期进行射击训练和搏击训练留下的痕迹。

「叫我苏晚就行。你来了——说明你已经去过三号仓库了。」

「我今天下午去的。东西我看到了。你知道那个皮箱里有什么。」

「你知道吗——那个皮箱里的东西是我姐姐的。」苏晚转头看向街道对面，目光停在楼宇之间漏出来的那一片灰蓝色的天空上，「周敏——我的姐姐——三个月前失踪了。报案之后警方查了两个月，什么都查不到——没有目击者，没有监控记录，没有通讯痕迹。就想从世界上蒸发了一样。」

「所以你自己查。」

「对。我发现她的失踪跟一个叫镜中人俱乐部的地方有关。但我不能亲自去——我是警察。警察不能在没有搜查令的情况下进入私人会所。但我需要证据来申请搜查令——这就是为什么我需要你。」

「为什么是我？」

「因为你写了一篇关于江城市失踪率的分析报道——稿子被你们主编毙了，但我看到了。你的调查笔记里有几句话——」她从夹克内袋里掏出一个笔记本，翻开到其中一页，读出上面她抄下来的句子：「'江城市过去五年间有七十四宗成年人失踪报案。除去已撤销、已寻获、及离家出走后自行归来的案件——仍有十一人下落不明。值得注意的是，这十一名失踪者最后活动区域高度集中于旧码头方圆两公里内。'」

她合上笔记本，看着林夜。「你离真相只有两公里——你只是需要一个人来告诉你那两公里里面有什么。那个人是我。」`,

"node_5":{
title:"失踪者公寓",
npc:"旁白",
text:`周敏的公寓位于老城区一栋建于九十年代初的六层居民楼的顶层。苏晚有钥匙——她们姐妹虽然各自有了不同的生活和职业，但对方家里都留了自己的门钥匙。这也意味着苏晚在周敏失踪之后，可以自由进出这间公寓——她来过很多次了，所有抽屉、衣柜、床垫下面的角落、甚至马桶水箱里都翻遍了。但每一次都找不到失踪的线索。

林夜是第一个把目光从下面的层叠搜索中移到天花板上去的人。

客厅的天花板上有一块石膏板明显不对——颜色比其他几块浅了一层，边缘的防水胶条也不是开发商安装的那一条。林夜站在一张餐椅上，用那把瑞士军刀撬开了石膏板的四个角——石膏板被移开的瞬间，一种霉味和纸张的气味涌出来。

天花板夹层里藏着一本棕色的硬壳笔记本。封面上没有字。翻开第一页——周敏的笔迹：

「如果有人在找——我没有失踪。我在镜中人俱乐部地下做卧底。具体入口在旧码头西侧F-03。如果有不测——这本日记帮我记住我自己。」

这本日记没有写在外面的任何地方——不是因为没有时间，是周敏精心设计成只给以后会来找她的人留下的线索。她把公寓里一切其他的东西都保持在正常状态——桌子上还有半杯发了霉的茶，电视遥控器还放在沙发扶手旁边，阳台上的盆栽已经枯干了但还摆在那里——一切都是正常的，正常到警方搜过三次之后宣布没有发现。只有这个天花板——只有这个只有躺在地上往上看才会注意到的色差——才能被那类「不会接受表面结论」的人发现。

苏晚看着这本日记，静静地站了很久。然后她蹲下来——用手背擦了一下眼睛。她说了一句话——像是在对日记说，也像是在对自己说，也像是在对一个现在已经不记得她的人说：「我找了你这么久——你就在这里。」

林夜把日记中的密码段拍下来，把笔记本放进雨衣的内层口袋。他的心跳比他第一天听到雨夜来电的时候还要快。因为这不再是一个失踪案件了——这是一个女孩，为了不让更多人和她一样失去自己的身体和记忆，选择把自己也塞进那个地下迷宫的通风管道里，在黑暗中和注射剂的副作用下，一天一天地用笔尖记录着这个魔鬼实验室的每一个坐标。`,

"node_5b":{
title:"俱乐部探查",
npc:"旁白",
text:`在夜间潜入之前，林夜决定先在白天的正常营业时段去一次镜中人俱乐部——以潜在会员的身份。

周日上午十一点，他开着一辆从报社借来的黑色轿车，停在了旧码头西侧的停车场里。这一次他穿的不是雨衣——是西装。一件老刘在退休前留给他的旧西装——袖口有一点磨损了，但款式还算端庄。他站在俱乐部的正门外，按下门铃——那个穿衬衫的保安第二次出来，对他的态度跟上次完全不同——因为他今天穿着西装。

「您好，我想咨询一下会员的事情——朋友推荐我来的。」

「哪位朋友？」

林夜报了一个从会员名单第8行上看到的会员名字。那个保安在平板上查了一下——那个名字存在，属于一个已经登记过的活跃会员。他找不出任何异样:「请稍等，白小姐会过来接待您。」

白小姐。

她出来的时候——林夜的第一反应不是别的，是那双眼睛。那是一双在普通社交场合下可以让人失去警惕感的眼睛——真诚的、从容的、像是她在认真地看每一个跟她说话的人。但当这双眼睛扫过林夜的脸的时候，他捕捉到了一个极其微小的延迟——大约三分之一秒。在那三分之一秒里，她的瞳孔没有收缩。

不是好客的瞳孔收缩——是评估。像一个猎人看着一只自己走进陷阱却还不知道的猎物。

「林先生——来我们这里可是需要一点缘分的。」她站着的时候，手里的细长香烟依然没有点燃——但她的每一根手指都在香烟上用一种固定的节奏打转。

「朋友说这家环境很好。我想找个安静的地方做点私人事务。」

title:"邻居的证词",
npc:"邻居老奶奶",
text:`周敏的公寓在三楼。走廊里有一股霉味——江城这个季节不可能没有霉味。林夜从周敏的房间出来，经过走廊时注意到对面那扇门上贴着一张褪色的春联，横批已经残破得只剩「平安」两个字。

他犹豫了一下，然后敲了门。

门开了一条缝。一只浑浊的、褐色的眼睛从门缝里打量着他——链子锁还挂着。大约过了五秒钟，那只眼睛似乎判断出他不是什么危险人物，链子锁哗啦一声被摘掉了。

开门的是一个老奶奶，看起来七十多岁，穿着一件洗得看不出原本颜色的棉布居家服，头发整齐地梳到脑后。她身材瘦小，但眼睛很亮——是那种在时间面前已经不需要害怕任何东西的亮。她说：「你不是她。你是——调查她的？」

林夜愣了一下。他还没开口，老奶奶已经自顾自地往下说了。「上个月，来了三个。警察，两个男的，一个女的。那个女警察问了我大约四十分钟。最后他们什么都没查出来——我说，他们不是查不出来，是不想查。」

林夜拿出周敏的照片——那是苏晚下午才给他的。老奶奶看了一眼照片，嘴唇微微颤抖了一下。她抬头，用那双老眼仔细地看着林夜，问了一句：「你是真心要帮她？」

「我是。」

老奶奶沉默了。她的沉默很长，像是老式收音机调频时的那种静电嗡鸣。然后她从身后的柜子里取出一个老花镜戴上——镜框坏了，用透明胶带缠着——又从针线筐里摸出一个东西，放在林夜手上。是一个扣子。黑色的，塑料的，上面有一个小小的蝴蝶形浮雕。

「她失踪那天晚上，」老奶奶说，「大约是晚上九点多——我听到走廊里有声音，不是吵架，是那种……压抑的谈判。我通过猫眼看了一眼——一个男人站在她门口，穿着深蓝色的制服，大约三十多岁，戴眼镜。周敏开门让他进去了。大约十五分钟后，那个男人出来了——他一个人出来的。周敏没有跟出来。我再也没见过她。」

「你确定是同一天晚上？」林夜问。

「我确定。因为我每晚九点吃药，那天我刚吃完药就听到了声音——那个男人走得很快，衣角蹭了一下门框，这个扣子就掉了。我捡起来了——我当时不知道为什么要捡，但我就是捡了。」

林夜拿起那颗扣子对着走廊的灯泡端详。蝴蝶形浮雕——不是普通的蝴蝶，是那种展开翅膀后，两翼之间的弧线连起来刚好形成一个对称的、类似于无限符号的图案。他把它翻过来，背面有极小的钢印：两个汉字——「镜·人」。

他的心跳猛地加快。

「你认识那个人？」林夜问。

「不认识。但我记得他的样子——」老奶奶摘下老花镜，擦了擦镜片上的雾气，声音平静得出奇，「他的脸——太平静了。就是太平静了，才让我觉得可怕。就像是……他来做一件很平常的事，就像去超市买一瓶酱油。一个人进了一个女人的房间，十五分钟后一个人出来——那个女的没跟出来——他一点都不慌。一点都不。」

老奶奶看着林夜的眼睛，抓住他的手。她的手很凉，但很有力：「我七十三了。活到我这个年纪，该怕的早就不怕了。小伙子——你查到那个人了，告诉我一声。我要去给他烧一张纸——不是给他的，是给周敏的。」

林夜握了握老人家的手。他把扣子放进了内兜里——和周敏的日记放在一起。`,

title:"日记密码",
npc:"旁白",
text:`周敏的日记在灯光下摊开着。二十页的密码——字母和数字的排列，密密麻麻，每一行都那么整齐，像是一个在最后那段时间里、用笔尖将恐惧一点一点刻印在纸上的人留下的最后的理性。

林夜用了两个晚上来破解这些密码。不是破译——是理解。他把笔记本带回报社，锁上了自己工位的抽屉，然后从报社的图书馆里借了三本书：《基础密码学教程》、《常用替换密码分类手册》、以及一本已经绝版的、需要在图书馆登记姓名才能借阅的《1990-2000年国内刑侦密码学案例集》。

周敏的密码不是复杂的数学加密。她用的是一种基于日期偏移的Caesar变种密码——将每个字母在字母表中移动一个特定的数字，而那个数字等于当天的日期。第一个晚上破解出的第一条信息是：「10-6 方远，你在吗？我需要你记下的那些编号。」

方远。这个她日记里第二频繁出现的人名——频率仅次于那些编号数字。

第二个晚上，林夜破解了日记的最后十页。当那些密码一一变成明文时，他看到了一份按时间顺序排列的详细实验记录——不是用医学术语写的，是用一个受害者在暗处悄悄记下的日常语言。每一行都带着她当时的恐惧和执着的记忆，像个被困在地下的人拼命往墙上刻下坐标，希望有一天能有人沿着这些坐标找到她。

日期：#Day 24
「今天第六次注射。醒来之后忘了怎么系鞋带——手指记得动作，大脑记不起顺序。K说这是'认知碎片化'，正常现象。正常吗？」

日期：#Day 37
「今天他们送来一个新人。编号#129。女生，不超过二十岁。收容所来的。她问我这里是哪儿。我告诉她这是个实验——她哭了整整两个小时。晚上的时候她安静了。不是因为不害怕了——是镇静剂的药效上来了。」

日期：#Day 58
「我已经不记得妈妈的脸了。我知道她存在于某个地方——但闭上眼睛的时候，那个地方是空的。不是忘了——是被盖住了。药物把关于她的记忆盖住了。像一块黑布盖上了一个还在发光的屏幕。光还亮着——但没有人能看到。」

日期：#Day 72【最后一条，字迹明显颤抖】：
「如果有人在找——我的时间不多了。K说下个月开始改用新配方C-11。剂量比旧配方大三倍。他需要'极限条件下的实验数据'。地下实验室入口在西区F-03。保安换班的时间。苏晚——如果你能看到这一段——对不起。我不该瞒着你去接这个卧底任务。」

卧底任务。

林夜把这段话读了三遍。手指在最后两个字上停顿了很久。周敏不是普通的受害者。她是一个卧底——一个潜入镜中人俱乐部内部进行调查的秘密记者或警察线人。她明知危险，但她进去了。

而她的妹妹苏晚——所有这些年来——一直在外面寻找她，却不知道自己的姐姐就在那道F-03的暗门背后，在注射剂和扫描仪的间隙里，用密码一点一点地记下了这一切。`,

"node_6b":{
title:"暗处的眼睛",
npc:"旁白",
text:`林夜离开周敏的公寓时已是凌晨两点。暴雨终于停了，但空气里弥漫着积水的腥气。小区没有电梯，他踩着吱呀作响的木楼梯往下走——三楼、二楼、一楼——每一层转角处那盏声控灯都要迟钝一拍才亮，像是某个不可见的玩伴在故意慢他半步。

一楼的防盗门半掩着。他推开门，站在门檐下——楼前的街道空无一人，路灯在积水的地面上投下橙色的光斑。夜风裹着一股说不清道不明的气味——不是垃圾，是烧焦的纸片和某种化学试剂混合起来的、若有若无的苦涩。

他开始往前走。大约二十米后，他听到了第二个人的脚步声。

不是错觉。是有意保持和他完全相同的步频——他的左脚落地，那个人的左脚也落地。他的步伐加快，那个人的步伐也加快。林夜没有回头——他从小在江城长大，知道在这种没有路灯的老城区巷子里，回头看等于给对方一个信号：你发现我了。他发现我了——这个信号在不同的人那里可以触发完全不同的结果。

他拐了一个弯，闪进一家已经关门的抄手店门口——不锈钢卷帘门旁边有一个凹进去的位置，刚好站一个人。他贴着墙，控制呼吸，等着。

五秒后，一个影子从他刚才站的位置经过。

不是流浪汉。那人走路的姿势非常端正——双肩平直，手臂摆动的幅度刚好是正规制服训练的标准弧度。黑色的短夹克，深色长裤，戴着一顶棒球帽压得很低。林夜的视线跟着他的轮廓移动——三秒之后，他看到了一样东西：那人衣领内侧露出一个极小的、银白色的反光点。不是拉链，不是纽扣——是金属徽章的一部分。

那个徽章的形状他刚刚见过。蝴蝶。

就是老奶奶给他的那颗扣子上，一模一样的蝴蝶。

林夜的胃立刻收缩了一下——这个生理反应他甚至来不及思考。他的大脑在同时处理两组信息：第一个信息是，这些人在跟踪他——他还没有到俱乐部，甚至还没有查到任何真正危险的信息，他已经进入了别人的视线。第二个信息是——他们不是今晚才注意到他的。苏晚来找他之后，甚至可能更早——从他踏进报社档案室那一秒起，就有人在某个监控屏幕前看着他了。

他想起了老刘那句话：「查这个事的人，没有好下场。」

那个戴帽子的男人站在前方大约十五米处——十字路口的中间——不动了。他停下来的姿态不像是在等红灯——十字路口是空的，满地积水，没有车也没有人。他站在那里，背对着林夜，像是刻意给林夜看他的背影。

林夜没有出去。他在那个卷帘门旁边的暗处站了整整三分钟。雨水顺着屋檐滴在他的肩上，衣服已经湿透了——但他一动不动。他不确定那个男人是等着继续跟踪他，还是在警告他——但不管是哪种，这个男人已经把自己的存在、把他背后那个组织的存在，像一根针一样扎进了林夜的意识里。

终于，那个男人收回了站在十字路口的姿势，把手插进夹克口袋，不急不慢地朝街的另一个方向走去了。他的脚步声在水洼中啪啪作响，越来越远，直到消失。

林夜从暗处走出来。他沿着来时的路往回走——他没有跟上去。走进今晚是一个发现真相的过程，不是送死的过程。他把刚才那个男人、那颗扣子、那个蝴蝶徽章全部装在脑子里一个叫做「必须弄清楚」的格子里。

回到主干道上——路灯亮了。一辆洒水车从旁边开过。城市的表层秩序在照常运转。没有人知道刚才在那条小巷子里，一个人在深夜被另一个人像影子一样地跟了三百米。

林夜站在路灯下，掏出手机——他用最快的速度在备忘录里打了几行字：

「一、跟踪者穿黑色短夹克，大约一米七八，有蝴蝶形徽章。
二、此人知道我的行动路线——说明组织有实时监控。
三、他们没有动手——为什么？是在观察？还是在等待什么？」

他关掉手机屏幕，把手机放进衣兜——这个夜晚已经不是关于一个失踪的女人了。是关于一个在暗处盯着他的、看不见的力量。

而这——反而让他更加确定：他必须弄清楚。`,

title:"报社与主编",
npc:"老刘",
text:`第二天早上，林夜在报社的编辑室里找到了老刘。

老刘今年五十六岁——在报社工作了整整三十年。他的办公桌上堆着比他身高还高的文件——各种采访记录、不完整的手稿、以及那些被总编毙过之后他依然保存着的选题提纲。他有自己的生存哲学:不主动惹事，但在事找上门的时候——绝不退缩得比年轻人快。

林夜把周敏的日记密码破译结果放在他桌上——一份用A4纸打印出来的摘要，用荧光笔标注了关键信息。

老刘看了十五分钟。没有说一句话。他的左手一直摩挲着下巴上的胡茬——这是他在思考复杂问题时的习惯性动作。十五分钟后，他从椅子上站起来，走到门口，把编辑室的门关上，然后从最下面的抽屉里取出一个纸袋。

「你知道我为什么毙了你那个失踪调查的选题吗？」他坐下来，把纸袋放在桌上——没有立刻打开。

「你说时机不对。」

「对，但不全是。」老刘打开纸袋，抽出一叠泛黄的剪报，把它们在桌上排开。是十五年前的旧报纸——林夜认出这是《江城晚报》的头版版面。老刘用食指点了点最上面那份剪报的头条——「江大实验室爆炸——一死两伤」。

「这个爆炸——是我去采访的。当时我比你现在的岁数还小三岁。」老刘敲着那张发黄的报纸，「在现场我看到了一件事，没有写进报道里。消防员在废墟里搬出那个受伤的研究生的时候，他嘴里一直重复着一句话——'她说不要停下来。她说配方是对的。配方是对的——只是这个世界还没有准备好。'」

林夜的心脏猛地抽紧了一下。

「你知道这句话是什么意思吗？」

「他女朋友死的时候在做什么？」

「那个死掉的女研究生——当时正在完成一个实验。」老刘一个字一个字地说，「关于神经突触可塑性调控。她在实验笔记里写下了一个配方，可以用来抑制某些不需要的神经连接——换句话说，定向控制记忆。完成的那一天——她死了。实验室在她死后三天被炸了。那个男生——那个嘴里一直重复着这句话的重伤者——从此消失了。」

老刘从纸袋里取出最后一张——一张今年的照片，印刷在光面纸上，像是从某个监控录像里截取出来的。照片上是一个穿着深灰色风衣的中年男人，站在一处大厦的柱子后面的暗影里。脸上有烧伤的疤痕，不是很明显——但在闪光灯的作用下，像一道从嘴角延伸到眼角的淡白色裂缝。

「这就是现在的他。」老刘说，「他从地下爬回来了。用了十五年。现在他有一座俱乐部、一个地下实验室、和一份要让这个世界接受他配方的执念。」

「你告诉我这些——是因为？」

「因为三月份我准备退休。退休之后——没有人能碰我的档案。没有人能拦我——也没有人能护你。」老刘把纸袋从桌上推过来，「这个纸袋里是我攒了十五年的资料。从今天起——它是你的了。」`,

"node_8":{
title:"追踪方远",
npc:"旁白",
text:`周敏的日记里提到方远一共十七次。第一次是在她第一天潜入地下实验室之后的使用记录——'方远——你在吗？我需要你记下的那些编号。'最后一次是在日记的最后十页——'方远逃走了。他们说抓到他之后会把他带回来。但我不希望他被带回来——因为带回来的方远，可能已经不是方远了。'

林夜从日记中整理出方远的轨迹。他是八个月前从地下实验室逃出来的——不是第一次。第一次在两年前——被抓回去之后在注射室被施以C-11的强制剂量，用以'测试记忆清除效果的持续时长'。他第二次逃跑是在四个月前——又失败。右腿在逃跑中被消防门夹断。第三次——上个月——他终于成功了，付出了左小腿截肢的代价。

他是怎么逃出去的——利用他对地下管道的熟悉。他是B区档案室的前管理员。他的工作是记录每一位受试者的每日药物反应数据。他记住了每一根通风管、每一处维修通道、每一个监控盲区。然后在他第三次逃跑的时候——他成功地把这些记忆从脑中转化为行动。

但方远没有去警局。因为他是K配方的共同开发者之一——那六十七个死去的实验对象中，有一半是用他的配方完成注射的。如果自首——他会在监狱结束此生。如果不自首——他会在这座工业废墟里度过他的余年。

林夜需要一个能找到方远的线索。周敏日记第47页提到过一个人——'孟老头。城西五金店的老板。方远去找过他一次。他说他在化工厂里见到方远的那个晚上，他给了他一块面包。'

天亮后，林夜骑着摩托车到了城西。五金店躲在一条小巷子里——门面只有两米宽，门口堆着生锈的铁丝网和一堆没有人会买的旧铜锁。孟老头坐在门口的藤椅上喝茶。

「方远？你找那个瘸子干什么？」孟老头的嘴角叼着一根熄了火的烟——他还没有重新点上，因为他说话的时候需要牙齿。

「我是记者——」

「记者——？」孟老头做出一个像是听到了什么好笑的事儿的表情，「方远最怕的就是记者。他说他手上沾了那么多名字——有一天被写进报纸里，他妈在家乡会抬不起头。所以你找我干什么——」他吹了一口烟——实际没有烟，就是一个嘴型的外在习惯，「——你们不是来找他做新闻的吧。你是来找那个地下的人的。」

林夜没有回应。

「地下——那些人以为我们这些老东西不知道。但我们知道——在这边做了小半辈子，什么管道图没见过。方远跟我说过一句话——他说：'如果有一天有一个人来找你问方远在哪——你告诉这个人，去废弃化工厂的西厂房。我住在那里。'留给一个记者——就是'这个人'。」

孟老头把地址写在了一张被水泡烂过的香烟盒上。林夜把烟盒塞进口袋里，骑上摩托车——发动机的轰鸣声在小巷子里反复地弹反射——然后他开上了通往废弃化工厂的路。`,

"node_9":{
title:"方远的真相",
npc:"方远",
text:`废弃化工厂在城西八公里处——一片被遗忘了将近二十年的工业废墟。厂区的大门已经被锈得变了形，上面的「江城化工厂」几个字只剩下了「城」字的一角的笔画还勉强能辨认。

林夜在大门外的碎石地上停了摩托车，从后备箱里取出手电筒。孟老头说方远住在西边的厂房里——那栋三层楼的红砖建筑，西面墙上有一个被炸开的大洞，洞口用一块皱巴巴的帆布遮着。

他掀开帆布走进去。手电筒的光柱扫过废旧的管道、倒塌的木架、以及角落里一个用破旧棉被和纸箱拼成的「床铺」。

没有人。但床铺旁边的地面上亮着一根蜡烛——蜡烛还是热的。

「别动。」一个声音从背后传来。

林夜没有动。他把手电筒慢慢放在地上，然后缓缓转过身。站在他身后的就是方远——看起来比照片上老了至少十岁。四十岁出头的人，头发已经白了一半，脸上的皮肤粗糙得像砂纸，颧骨高高地凸起来——典型的营养不良加长期精神紧张的面容。

「你是记者。我看过你写的报道——关于制药厂的那篇。」方远的手里攥着一根生锈的钢管，但他的手在抖——不是一个战斗姿态的人会有的那种抖。

「我是。方远——周敏的笔记本上提到了你。我需要知道地下实验室的位置。她还在里面。」

方远默了很久。他把钢管放下了。不是因为信任——是因为太累了。那种在逃亡路上耗光了所有力气之后，连戒备的肌肉都懒得再紧绷的累。

「地下实验室有三个出入口。F-03货梯是最容易进的。每周二凌晨两点到四点——安保换班。但我劝你不要去。」方远用手擦了一下脸上的灰，在林夜的灯光下，林夜看到他手背上全是针孔——旧的、愈合的、叠在新伤疤上的。

「为什么？」

方远抬头看着林夜，眼睛里有一种近乎同情的疲惫：「因为进去的人——只有我知道怎么出来。而我花了三年。三年里我逃跑了四次——前三次都被抓回去。第四次的代价是——」他掀起裤腿。左小腿是假肢。

林夜的喉咙像是被什么堵住了。

「但我有你需要的东西。」方远把手伸到床铺下，取出一个黑色的小物件——一个U盘。「这里面是所有实验对象的编号。他们的位置、治疗进度、以及每个人对应的监控频率。还有管道图——地下三层全部的。我用了三年时间把这些画出来。不是给你——是给我自己。我怕有一天我被抓回去之后——他们会用M-724把我关于这里的记忆全部抹掉。但只要这个U盘还在外面——我没有白白待过这三年。」

他把U盘塞到林夜手里。他的手很凉。

「方远——跟我一起出去。我带你去报案。」

「我不能报案。你知道吗——K实验室里死的那六十七个人，有一半是我的药。是我配的配方。我走不了。」方远的声音在化工厂空旷的厂房里回荡，「但你不一样。你是干净的。带着这个U盘——去把那个地方烧掉。」`,

"node_10":{
title:"潜入准备",
npc:"苏晚",
text:`镜中人俱乐部就在旧码头西侧的防波堤上方——一栋三层的灰色建筑，外表看起来像是一座废弃的旧仓库。但走近之后你会发现：外墙是灰色的，但每一块砖的接缝都干净得像刚刚用牙刷清理过；窗户是封死的，但窗玻璃后面透出的光经过了精心设计的散射处理——从外面看只是微弱的橙色暖光，但站在里面的人会看到整面墙都是发光的。

林夜和苏晚在码头东侧的集装箱后面碰了面。集装箱上刷着「江城港务局」的旧字样，表面的漆已经剥落了一大半，露出下面暗红的铁锈。海风从江面方向吹过来，带着咸腥的水汽和一种说不清的化学气味——不是污染的化学气味，是旧码头地下渗出来的、被密封了太久的工业用清洁剂的气味。

「潜入方案有三个。」苏晚把一张标满标注的卫星照片铺在集装箱的铁皮上。照片是三天前买的——她自费从某个卫星图像公司购买的，用了两周的薪水。照片上显示着镜中人俱乐部的三个可接近入口：

F-03货梯。北侧。管理最严格的入口——需要密码和近场通讯识别卡。但每月二号凌晨两点到四点有十五分钟的安保换班窗口——这是方远U盘上标注的。

维修通道。南侧。一扇锈迹斑斑的铁门。门上的旧锁已经锈死——用一根撬棍就能打开。但通道内部没有灯光——方远在管道图旁边写了一行小字：「维修通道内部有五处压力感应踏板。位置记忆——踩错一处触发警报。」

VIP包厢外的暗门。从VIP走廊尽头的镜框机关进入，通过权限码解锁后通往地下。需要两种关键信息：会员编号对应的生日数字倒序排列，和K的私人密钥前三位。这两个信息——林夜从柜台下的会员名单和方远的U盘里都已获得了。

林夜看了三遍卫星图。每一种方案都有不同的风险体现和不同的奖励。

第一种——稳健：从F-03货梯进，在安保换班窗口内争取最短路径，直达地下二层档案室。风险最低，容错率最高，但档案室可能在值班室对面——就算窗口期能进，出来的时间不够。

第二种——技巧：从维修通道走，踩着黑暗中的压力感应踏板。五次敏感板——方远标注的位置是从他记忆里凭手感画出来的，有一定偏差。踩错就会被无声报警。但他不需要密码——所有的门都是老的、生锈的，体力就可以解决。

第三种——大胆：走VIP大门——光明正大地从前台登记进入酒吧区，利用暗门和权限码潜入地下。这是最危险的方案——因为这意味着他在进去之前就得在前台留下身份记录。但只要不触发信号，他能在地下行动的时间最长——因为K的所有安保逻辑都是「防外面，不防里面」。

苏晚从夹克里抽出一支对讲机。「我在这边等你。陈队长在两百米外的应急待命位置。警力部署好了——只要我得到你的信号，三分钟之内能突破正门。」

林夜把对讲机塞进雨衣内层口袋。雨还在下——粘稠的、三月末的江城的雨，打在地上的声音像是在用一根细棍敲一面旧鼓。

「如果我进去之后两个小时没有信号——」

「那我来找你。不管我是不是穿着这件夹克。」苏晚说完，转过身走进集装箱的阴影里。`,

"node_11":{
title:"周五之夜",
npc:"旁白",
text:`周五晚上九点，林夜站在镜中人俱乐部的正门外。

正门比他在远处看到的任何一面墙都要厚重——那是一扇接近三米高的橡木门，上面嵌着两个被磨成镜面的金属把手。门缝处没有光线渗出来——整扇门被设计成完全接缝的、不漏一丝内部影子的。门上方只有一个镶在石墙上的很小的黄铜铭牌，上面没有写俱乐部名称——只刻了三个数字：「608」。

林夜从方远的U盘里得到了这个数字的含义：镜中人俱乐部的内部编号。正式名称在任何地方都不被记录——因为在所有公开文件里，这座建筑只是「旧码头西侧第608号房产」。这是个法律层面的空白——它没有注册为企业，没有在工商管理体系内留下任何痕迹。它是幽灵建筑——而你进入幽灵建筑的方式，就是知道它的内部编号。

他在雨衣里整理了自己的装备：那支二手单反相机充好电放在了防水袋里；录音笔别在腰间的内层口袋里，可以用拇指一键启动；瑞士军刀在裤子口袋里——虽然他真心希望用不到它。

深吸一口气。他推开门。

门后是一条短廊，铺着暗红色的丝绒地毯——不是红色的，是暗红色的，红到接近黑色的那种。短廊尽头站着一个穿衬衫的男人——身材高大，面相平淡，但站姿和呼吸的频率说明他是一个经过正规训练的人。

「欢迎。有预约吗？」

「没有。」林夜重复了方远U盘里记录的接客流程，「但我打牌不错。听说白小姐在找新面孔。」

那个男人打量了他三秒钟。然后从身后取出一个平板电脑——屏幕显示出俱乐部的内部规则：「本俱乐部为私人娱乐场所。入场需缴纳保证金。禁止携带摄影设备。」

林夜把相机留在前台。但他把录音笔放在了雨衣内层——那个保安没有搜到。他被一个年轻的女服务员引到了一楼的大厅。

这一瞬间——灯光、声音、气味，像是突然从寂静中被释放出来的洪流。一楼的酒吧区有弦乐四重奏在现场演奏——不是古典乐，是一些迷幻的、刻意放慢节奏的现代弦乐编排。空气中弥漫着雪茄、香水、和一种他说不出名字的花香——桂花加某种抗氧化剂的味道。每一个客人看起来都在享受——但那不是真正的放松。林夜作为记者的直觉告诉他，这里的每一张笑脸后面，都在对话中藏着某种没有说出口的交换。

他在吧台前站了一会，然后——他看到了走廊深处的那个镀金镶边镜框。三米高，两米宽，玫瑰浮雕的暗纹中心微微下陷——像是一个拇指的印记。

这就是那道暗门。

但他现在不能直接过去。在这么多双眼睛里——在被白小姐的视觉审视笼罩的整个空间中——任何一个走向那个镜框的人都会在二十秒之内被人拦下。

他需要另一个入口。`,

title:"踩点",
npc:"旁白",
text:`林夜从西装口袋里掏出他的记者证——不是《江城晚报》的名片，是中华人民共和国新闻总署核发的正式记者证，卡面上的压印是货真价实的，编号是任何人都可以在网上查到的。

白小姐接过记者证，翻了一个面，又翻回来——然后她把其中一个字母挑出来在灯光下看了看，像是在鉴别某个印刷防伪标记的真伪。然后是两秒钟的停顿——在那两秒里，她的眼睫毛没有动。

「林记者——记者来这里找新闻吗？」

「我来做一篇关于旧码头区空间再利用的商业报道。我听说这个俱乐部改建得很成功——我想写它在城市更新中的例子。」

「写我。」白小姐把记者证还给他——然后把那个一直没有点燃的烟嘴从嘴角左边换到右边，「我喜欢被写。但你写出来之后——你的名字也在上面了。你记住了——你写好之后再放在桌上。如果你的脸在我面前出现过一次，OK。出现过第二次——我不喜欢。你做的商业报道是商业报道。但如果你要写点别的——最好还是不要再出现。」

她的语气不是威胁——威胁会带着急迫的能量。她说话的能量是平稳的——在她字面上说的是'不喜欢'的背后，是一整个地下组织在为你准备了什么样的回应。

但她给林夜发了一张临时访客卡——卡面是白色的，上面写着「镜中人俱乐部 临时访客证」。卡片背面的小字写着：「仅限一楼大厅及酒吧区使用，十六小时后过期。」

这张访客卡是一种恩赐——也是一种试探。林夜拿了卡，谢过白小姐，然后走进了一楼大厅。这一次他不是偷窥者——他是被邀请的客人。

他在大厅里花了半个小时，和几个会员聊了天，喝了一杯苏打水（他没喝酒——因为他需要清晰的神经节点）。在这段时间里他捕捉到了大量细节：大厅里的弦乐四重奏乐队每一次奏到一首新曲目的间隙都会交换座位——不是节目安排，是短距换防。钢琴师是白小姐的人——他在弹的间隙把手机放在钢琴的谱架上，屏幕一直亮着。他的手机屏幕上是一个程序——从远处看，像是安防监控的第三备用显示终端。

这家俱乐部是一个精心构建的迷宫——每一件家具、每一支曲子、每一个面带微笑的侍者——都是一道防线。`,

title:"后门潜入",
npc:"旁白",
text:`苏晚在电话里只说了一句话：「后门——我找到了。F-03货梯入口，工人通道。你到了直接推门进——别敲。」

凌晨一点三十七分，林夜穿着雨衣站在旧码头区西侧一座废弃冷冻仓库的外墙背后。这里离镜中人俱乐部的正门大约三百米——不是直线距离，是绕过围栏、穿过废弃的铁路轨道和堆放集装箱的空地的曲线距离。

F-03是一扇锈迹斑斑的老旧铁门。铁门原本是冷藏库通向货运电梯井的维修入口——十五年前这扇铁门最后一次正常开闭是大爆炸当晚，消防员用了切割器把一个被困在井道里的人从这里救出来。被救出来的人是K——那场爆炸烧伤了他右侧半张脸。十五年后，他把这扇门改造成了地下实验室的物资后门。

门上没有锁——因为方远在他第三次逃跑中把锁芯拆掉了。他把拆下来的锁芯扔进了井道里——没有人费事再装一个新的，因为这扇门太隐蔽了。

林夜推开门——井道的腹部在黑暗中张开了它湿冷的、带着铁锈和污水气味的呼吸。他用手电筒往下照：井道直径三米，从上到下贯穿了大约四层的地下空间。在井道的最底端——微弱的光——无影灯的蓝白光——照亮了一个标记着「B」的箭头。

苏晚在正上方从屋顶上绕过来的——她没有走井道，而是沿着屋顶上的空调管道爬到通风井的上方，从通风百叶窗的开口下降到了地下二层。她的路径是逆向的——她从地下往地面走的同时林夜从地面往地下走。他们在B区走廊的交叉点相遇——井道底部B层的防火门外。

「你在上面看到了什么？」林夜问。

「屋顶上有一根天线——不是商业天线，是军用级的高频信号天线。K在监听附近的所有无线频段。所以我们的对讲机不能用——所有的通讯都要靠暗语和纸条。」

「地下呢？」

「地下有六个受试者囚室——B2层。我在地下二层的走廊里看到了周敏。她昨晚经历了一次新的注射——副作用包括暂时性口语失禁和短距离记忆消退。但她的手还在写——她用一支从清洁工拖把桶底捡到的铅笔头在囚室的地面上画了一朵向日葵。」

林夜沉默了一会儿。然后他蹲下来——在防火门旁边的那片满是灰尘的水泥地上，用他的手指写下了两个字：「今晚。」`,

"node_12":{
title:"镜中倒影",
npc:"旁白",
text:`林夜乘电梯上了三楼，来到了赌场区的中心。

这里和一楼的大厅是截然不同的两个世界。一楼是一个伪装成高端私人会所的社交场——香槟、钢琴曲、穿着晚礼服点头微笑的人。三楼是一个赤裸裸的肉体空间的狂欢——筹码碰撞的声音、轮盘滚动的咔嗒声、以及穿插在其中的人声的低吼和叹息。空气里混着烟味、酒精味、和某种更隐晦的、像是肾上腺素被大量释放之后残留在空气中的金属气味。

让林夜感到不安的不是这些——是墙上的镜子。

赌场场的每一面墙都覆盖着巨大的镜面——从地面到天花板，整面整面的镜子。不是装饰用的——是把整个空间放大了无数倍的视觉陷阱。你走在这里的任何一个位置，都能看到自己的倒影——以及所有其他人的倒影。你的每一个动作都被反射、被复制、被分散到空间的不同角落里。

视觉剥夺。林夜在心理学基础课上读过这个概念——当一个人被置于全面镜面反射的环境中时，大脑会逐渐丧失对空间和自我的感知。视觉输入压倒了其他感官——你不再知道哪一个是真实的你，哪一个是反射的幻影。

他把目光从镜子上移开——但镜子太多了，无论往哪个方向看，他都能在余光里看到自己的身影在动。他的手心开始出汗。

然后他注意到了一个不应该是反射的人。

在远处的角落——在一排老虎机的侧边——有一个女人也在看着镜中的他。不是直接看——是透过镜子的反射在对视。她穿着一件暗红色的旗袍，头发盘成一个精致的髻，右手夹着一根没有点燃的细长香烟。她的嘴角微微上扬——那种笑容不是友善的笑容，是看穿了你一切伪装之后、觉得有趣的审视者的笑容。

林夜的脊背一阵冰凉。他知道自己被识破了——不是被理性判断，是被直觉。

那个女人——在他大脑中还没有来得及形成「白小姐」这个称呼之前——已经转身走了。消失在另一面镜子反射的无限空间中，像一个幻影离开了一个镜面迷宫。

林夜在原地站了整整二十秒。然后他做了一个决定——不管那个女人有没有看穿他，他已经在这里了。退缩不是选项。`,

"node_12b":{
title:"大厅观察",
npc:"旁白",
text:`林夜没有直接走向暗门。他在吧台前站了将近二十分钟，然后开始沿着大厅的边缘慢慢绕行。

一楼大厅是俱乐部最'公开'的区域——但这里公开的只有表面。在弦乐四重奏的掩盖下，在香槟杯碰撞的脆响的间隙中，林夜捕捉到了不同客人之间传递的暗语。两个穿西装的中年男人在角落里交换公文包——不是握手，是交换包，整个过程眼睛没有看对方。一个年轻的、穿着昂贵礼服的女人在远离人群的沙发上独自坐着——她没有伴侣，但她面前的玻璃茶几上放着两杯不同颜色的酒，说明有人在很短的时间内会过来。

他决定去洗手间——不是真的需要，是因为洗手间通常是没有监控摄像头的死角。他在洗手间里等了大约两分钟——然后发现洗手间的墙上有一个换气窗。换气窗的百叶格是向下的——他的目光越过窗叶的缝隙，看到了隔壁房间。

隔壁是白小姐的私人休息室。

从换气窗的百叶缝隙里，林夜看到了一张小书桌——桌子上放着一台没有打开的笔记本电脑，和一个皮革封面的笔记本。笔记本的封面上烫着一个银色的字：「白」。

「白小姐——你这个名字在会员名单上不出现，但每一个会员都知道你的名字。你不是会员——你是钥匙。是通往地下那扇暗门的钥匙。」林夜在心里说。

他悄悄退出洗手间，把这一发现记在了脑子里。沿着一楼大厅的走廊继续侦查——他发现走廊东西两侧各有一道防火通道门，每道门上方都有一个很小的半球形监控摄像头。摄像头的覆盖半径大约是三米——在这些半径之外、靠近大厅中心的位置，是监控的盲区。

大厅里还有一个细节不容忽视：墙上的每一面镜子都是微倾斜的。不是水平的——每一面镜子的上沿比下沿往墙里收了大约两度。这意味着每个站在镜子前的人——当他看向自己的倒影时——他的脚会比他的脸更靠近镜面。这是一个微小的、不容易被察觉的视觉效果，但它会让站在镜前的人不自觉地感到不安全和一点点失去方向的微晕。这是精神扰乱技术在室内设计中的应用。

林夜离开了大厅。他把他的侦查笔记塞进雨衣内层。今晚最重要的信息是：洗手间里的换气窗——是一家开放性的、没有上锁的、通往白小姐私人休息室的可能入口。`,

"node_13":{
title:"社交场上的情报",
npc:"旁白",
text:`大厅的角落里，有两个人在低声交谈。一个微胖的中年男人——手上戴着三枚看起来很贵但没有什么品位的戒指；另一个——瘦长的、戴着一副无框眼镜的年轻人，手指翻动着一个皮夹里装着的一叠文件，动作很快——像是在跟时间做某种不情愿的交易。

林夜坐在他们背后的沙发里——中间隔了一道作为隔断的盆栽(假植物，叶子是塑料的），高度正好能遮住他半个身子。他把录音笔放在沙发的扶手下方，用靠垫盖住——开始录音。

「这批货要在这个月底之前到位。K很急——他的三批老受试者都失败了，新配方的样本基数不够。」胖男人一边说一边把一只金色戒指在手指上转来转去——像是在数轴上的某个刻度。

「收容所这个月送过来的只有三个人——两个有糖尿病史，没法注射。唯一的那个是上周送到的——编号#131。但是#131在接受第一次注射之后四个小时就出现了重度过敏性反应——现在还在B区急救室。」年轻人的声音很急促——他不像是在担心病人，更像是在担心自己的KPI完不成。

「所以呢？月底之前给我凑五个。城北的流浪汉营地去抓——晚上，别在白天。」

「流浪汉营地有志愿者——他们每天晚上十一点以后有人在营地外围巡逻。如果巡逻志愿者发现我们抓人——」

「那就别让志愿者发现。你在保全工作中做了几年？四年——这四年你抓过多少人了——二十个？你觉得那些巡逻志愿者二十四个小时都在看吗？他们不睡觉？凌晨两点到四点——一样的。所有流浪汉——最困的时候就这两个小时。去抓。」

林夜把这段对话从头听到尾。然后他把录音笔从靠垫下面取出来——关了。

这段话录下的不是犯罪证据——是犯罪计划。K不在场，但他下面的中层管理者正在筹划——同一个犯罪基础，同一个非法拘禁手段，从流浪汉营地里去抓人。如果林夜能在这些人完成计划之前先行动——K实验室的新一批受害者的名单，就不会被写进受试者表格里。

他站起来，朝大厅的另一端走了几步——在镜面反射中看到那两个人的背影。然后他注意到一个更重要的细节：那个年轻人的皮夹里夹着的文件封面上有一个圆形的、旧式的蜡封印章。

这个印章——在老刘的档案袋里，贴着同一类印章的十五年前的旧法院公函出现过。函上写着：「因证据不足，撤销对江城市旧码头区失踪案件的进一步调查。」

政府印章。不是私人的——是有人从政府渠道拿出来的。

这个俱乐部扎根江城十五年了——从爆炸那天起，它的每一个分支都在政府系统内部有一个隐形的庇护者。`,

"node_13b":{
title:"VIP区域",
npc:"旁白",
text:`VIP包厢区在八楼。林夜趁门口保安转身接电话的十几秒间隙，侧身溜进了消防通道。楼梯间里的应急灯发出惨绿色的光，墙壁上贴着陈旧的防火门标识，角落里结着蜘蛛网。他沿着楼梯往上走——八层楼，每走一层都能听到自己心跳的回响。

推开八楼的防火门，眼前是一条截然不同的走廊。地上铺着深红色的羊毛地毯，厚实得每踏一步都像踩在棉花上。走廊两侧是一扇扇紧闭的深色木门，每扇门上都镶着一块金属牌，刻着不同的图案——玫瑰、蛇、眼睛、天平。走廊尽头有一面巨大的落地镜，镜框是镀金的，在暖黄色的壁灯光下泛着幽暗的光泽。空气中飘着一股淡淡的檀香味，混着某种更隐晦的气味——像是消毒水和旧钞票混在一起的味道。

林夜放轻脚步，沿着走廊往里走。经过第三扇门时，他听到了争吵声。

「……已经三个了。三个月内三个实验对象死了。你觉得还能瞒多久？」这是一个年轻的男声，带着压抑的愤怒和恐惧。

「闭嘴。你以为我想这样？」另一个人回答——年纪更大，声音粗粝，像抽了几十年烟的老烟枪，「K的命令——用新型催化剂，代号C-11。剂量太难控制了。第一次注射——对方的神经系统直接崩溃了。第二次——脑水肿。第三次——心脏骤停。这不是我们的问题，这是配方的问题。」

「那就把这些数据提交给K——让他知道C-11不能用——」

「你疯了？没有人能对K说不。上次有人试图这样做——你还记得李博士吗？他的'退休'是怎么回事，你自己心里清楚。」

房间里沉默了很长时间。林夜把录音笔从口袋里掏出来，按下录音键，把麦克风对准了门缝。

「还有那个姓方的——方远。」老烟枪突然开口，「他在失踪之前是不是拷贝了实验数据？如果他真的带走了那份东西——如果那份东西落在警方手里——我们所有人都得完蛋。」

「所以K才急着找那个姓林的记者。」年轻人说，「不是因为他的文笔。是因为他知道怎么追踪方远留下的线索——方远的U盘上有加密，只有跟方远接触过的人才知道解密方法。」

林夜的心脏猛地缩紧了一下。方远。那个他在废弃化工厂里遇见的叛逃研究员。那个把U盘塞给他之后就头也不回地跑进黑暗中的人。K在找的——是林夜自己。

房间里响起椅子被推开的声音。脚步声朝门口走来。林夜迅速退入旁边的一个墙面凹位，后背紧贴着冰冷的镜面。门开了——两个穿白大褂的中年男人走出来，一高一矮，一边走一边还在低声争论。他们没有往林夜的方向看一眼，径直走进了走廊另一端的电梯。

林夜的掌心全是汗。但他录到了。实验对象的死亡数据、C-11催化剂的致命副作用、还有K在追踪方远U盘的关键信息。`,

"node_14":{
title:"柜台下的名单",
npc:"旁白",
text:`林夜在前台登记进入之后，等待了大约二十分钟才找准了时机。那个穿衬衫的保安被白小姐叫到后面去处理一个声音很响的投诉——某个会员在VIP包厢里说酒不够。保安走了——前台柜台现在是空的。

他走到柜台前。柜台的桌面是一整款玻璃面板，下面的抽屉有两个——一个有简易密码锁，一个没有。没有锁的抽屉里放着一些常见的文书用品——笔、胶棒、空白会员申请表——没有价值。

有密码锁的那个抽屉。

林夜蹲下来，用左手转动密码轮，右耳紧贴着抽屉的金属面板。这是一种老式的四位数密码锁——不是电子锁，是机械转轮锁。机械转轮锁有一个致命的弱点：当你转动正确的数字经过锁片对位位置时，金属锁片之间摩擦的声音会有一个极其微弱的停顿——不是声音消失了，是声音的边缘变了。普通人的耳朵听不出来——但林夜花了三年时间在报社档案室里研究老旧锁具，因为他的大部分调查报道都涉及到进入被锁着的档案柜。

他花了三十六秒——四位数全部对齐。锁片咔嗒一声弹开。

抽屉里面是一本用皮革封面装订的会员名册。不是电子版——是手写的纸质版。林夜翻到最后一页——也就是登记时间最近的那一页——上面写着三十六个人的名字。每一个名字旁边标注了入会日期、职业、联系方式和简要备注。

其中十二个人的备注里写着同样的一个字：「献」。

他继续往前翻——翻到中间——翻到最开始的几页——每一页上都有几个名字后面带着这个「献」字。他在周敏的密码日记中见过这个字。周敏在日记的第32页写道：「K把实验对象叫做'贡献者'。不是'受试者'——是'贡献者'。他说他们在为科学献身——所以用'献'字标记。」

林夜用他从报社借来的二手相机拍下了每一页。在拍摄过程中，他的余光扫到了柜台后面的监控摄像头——那个摄像头在朝VIP走廊方向旋转，大约每八秒扫一次柜台区域。在它下一次对准柜台之前——他有四秒钟。

四、三、二、一——摄像头转过来了。他已经站起来了，抽屉还锁回去了，会员名单已经回到了抽屉里。只有一个背着相机、站在大堂里的会员——看上去在等白小姐。`,

"node_14b":{
title:"白小姐的书房",
npc:"白小姐",
text:`白小姐的私人休息室就在大厅西侧的走廊尽头——门没有锁，但不是因为疏忽。是因为不需要——谁都知道这扇门背后是谁的房间。在这个俱乐部里，白小姐的私人空间和俱乐部大堂之间的界线是一条心理上的火线——踏过它的人，只有两类：被邀请的客人和将成为实验对象的新编号。

林夜在洗手间的换气窗上方探视了十分钟，确定了白小姐不在休息室之后——他决定进去。

他翻过洗手间换气窗的百叶格——那个过程不优雅，人被卡在窗框和暖气管之间的时候很难保持仪态——但这是他第二次在俱乐部里把身体塞进一个自己不属于的空间了。他落进休息室——地板上铺着一层厚厚的软地毯——波斯风格，红色和深蓝色交织的花纹。

休息室里的小书桌上放着一台笔记本电脑——屏幕暗着，左下角电源指示灯还是绿色的——说明她在不久前用过它。键盘旁边是一本皮革封面的笔记本——封面上烫着一个银色的字：「白」。

text:`苏晚用方远给的那把已经磨损到几乎认不出牙花的旧钥匙打开了F-03货梯的控制面板。货梯的上方是一道原始的、由滑轮系统和铁链操控的货运天井——不是现代电梯，而是把货物从地面一层一层往下顺着绞盘运到底层去的垂直通道。

npc:"旁白",
text:`暗门后面的走廊比外面的赌场走廊要窄得多——不到一米宽，墙壁没有粉刷，裸露出层层叠叠的红砖和水泥勾缝。走廊大约三十米长，尽头是一扇厚重的钢制防火门，门上没有把手，只有一个刷卡感应器。

走到尽头的时候，他注意到防火门的右侧有一个小观察窗。观察窗的玻璃上面覆盖着一层灰——但这层灰不是均匀的灰尘沉积，而是有人用手指在上面擦出了一条弧形的干净区域——说明最近有人从另一侧透过这个窗户向外看过。

周敏。她还活着。她的数据——脑电图、心率、激素水平、神经递质浓度——正在这些屏幕上，被一群穿白大褂的人实时监控着。

钢门在她身后缓缓合上。在完全闭合之前的最后一秒，林夜看到了那扇门的里面——看到了一行贴在门后的手写警示语：「实验重地。未授权进入者将被视为入侵者。安保有权使用一切必要手段。」`,

text:`B区是地下实验室的核心控制区域。两条主干走廊——编号B-1和B-2——呈V字形交叉，像一个被埋在地下的断头剪刀。在两条走廊的交汇处是实验室和注射室；北侧走廊通往档案室和监控中心；南侧通往受试者囚室区。

一点二十一分——一丝不差——张明停在了换班点。他按下墙上的打卡按钮，然后把对讲机递给从另一条走廊走过来的夜班保安——李思远。整个过程花了大约两分钟。

「你有多少时间？」苏晚推开门。

「信号回放只能做一次。一次之后它会自毁——但够了。」`,

npc:"旁白",
text:`林夜在被保安发现之前的几秒钟——看到了监控摄像头上面的红色LED灯突然亮了。那一刻他的心脏漏跳了一拍——不是惊吓，是本能警告。他的身体在这种压力条件下已经形成了一个固定的反应序列：先思考，再心跳。

他退进了走廊旁边的配电间——一个只有不到五平方米的、墙上挂满了空气开关和电表的小房间。他把门从里面拉上，握住门把手不让门自动弹开。然后他屏住了呼吸。

text:`林夜从藏身的角落站了出来。

林夜深吸了一口气。他把右手伸进雨衣内层——两个保安同时绷紧——但他的右手抽出来的是一张卡片。不是武器。是记者证。

title:"地下实验室核心",
npc:"旁白",
text:`档案室旁边的实验室大门被林夜用从电工间里一枚旧RFID转发器骗开的。门滑开的那一瞬间——灯光从门缝里挤出来，像一条细长的白色舌头，舔在走廊的黑暗地板上。

林夜走到控制台前。屏幕上跳着一个他现在熟悉的界面——C-11实验版本记录系统。他打开了菜单中的「受试者记录」子模块——屏幕切换成一张表格，第一列的标题是蓝色的：「编号」。

#001 — Deceased — 2011年9月
#002 — Deceased — 2011年10月
#003 — Deceased — 2011年10月
#004 — Survived — 转移至B区观察室
#005 — Deceased — 2012年1月

title:"撤退",
npc:"旁白",
text:`警报声还在他耳膜里嗡嗡作响。

林夜沿着来时的C区走廊往回走——不，不是走，是一种介于走和跑之间的、每一步都在计量距离和时间的快速移动。他的右手按着雨衣内层的录音笔和实验记录——这些东西现在比他的命还重要。

健身教练的情况很糟。刚才在档案室门口，他们被四个巡逻保安堵在了走廊里。林夜趁机从另一侧溜了——这是他事先和教练商量好的：如果有意外，教练用体型吸引注意力，林夜带着证据走。教练在后方走廊里引起了一场不小的混乱——林夜听到了打斗声、金属碰撞声、还有两个保安的对讲机在同时尖啸。但他没有回头。这是他和教练达成的分工——教练知道他今天进来不是为了打架，是为了让那些数据见到明天的太阳。

身后的声音渐渐远了。他现在在C区——地下设施最深、最冷、也最安静的区域。这里的墙壁不是水泥的——是凿出来的天然岩石，表面渗出冰冷的地下水和一种说不清道不明的矿物质气味。地面上的水洼反射着头顶那根唯一还亮着的日光灯管，把林夜的影子切割成不连贯的碎片。

他找到了来时的货梯入口。但货梯被停掉了。

旁边的墙壁上贴着一张手写的通知——墨水已经退了色，但勉强还能辨认：「本电梯因例行维护暂停使用。请走C区紧急通道。」

紧急通道——方远的U盘上标注过。但方远在那条通道旁边写了一行字：「C区紧急通道 — 通往地下三层停车场。出口距离江边一百五十米。但K的人每周会轮班在三层停车场入口设岗。时间规律不明。」

不明。

林夜低头看了一眼自己的手表。凌晨三点四十二分。如果岗哨是两小时一轮换——下一轮换班应该是四点。如果他能在四点钟之前赶到三层停车场——他可能能找到那十几分钟的盲区。

他开始往上走。楼梯很陡——每一级台阶的高度都不一样，像是施工的时候没有使用过同一套尺寸的模具。他的腿已经开始发酸了——从凌晨一点到现在，他已经在地下走了将近三个小时。

但他不能停下来。停下来的人——会成为白小姐笔记本上那些「处置方式」一栏里的下一个勾选项。`,

title:"陈队长的秘密",
npc:"陈队长",
text:`陈队长让林夜来江边见面——不是警局，是一个废弃的渡轮码头边上的一个旧集装箱。集装箱被改造过——里面有一张铁皮桌、一把木椅、和一张钉在墙上的江城市旧城区全景地图。地图上用红色图钉标出了十几处位置——全部在旧码头方圆两公里内。

「你不是第一个找我的人。」陈队长说，他的背靠在集装箱的铁皮墙上，手臂环在胸前。他今天没有穿警服——一件旧得衣领都磨破了的深蓝色毛衫，外面套了一件黑色的旧雨衣。

「周敏也找过你？」

「对。三个月前——在她主动潜入地下实验室之前。她来我的办公室，把她的线索放在我的桌上。她说这个俱乐部在做非法人体实验。我申请了搜查令——但被驳回了。驳回的理由是——'证据不足'。」

「她有什么证据？」

「跟你现在一样的东西——会员名单、日记、方远的管道图。但她是刑警——警察。警察的证据要经过双人复核、部门审批、检察院备案。她走了一个月的流程——一个月之后，证据被封锁了。不是删除——是锁定了：在电子档案系统里被标记为'待补充'，无法继续提交。做这件事的人——」陈队长停顿了一下，像是有些词语太粗糙了，他需要先用自己的舌头把它们磨圆了才能吐出来，「——是我们刑警队的副队长。王副队。」

林夜觉得自己的胃像是被一只冷手拧了一下。

「王副队——是K的人？」

「十五年。他安插在警队的内部联系人——不是在K发达之后被买通的，是在K那个爆炸发生之前就是他实验室的同学。他在爆炸的案发报告里做了手脚——把'外部入侵'改成了'实验失控' 。不是为了让K脱罪——是为了让K的实验配方在警方记录里被标记为'已终止'，不再被调查。这样K可以在地下继续他的研究——而他王副队每三个月会收到从俱乐部汇出来的一笔匿名资助。」

「你知道多久了？」

「十年。但是我不能动他——因为他在警队的职务比我高一个级别。我可以写出全面弹劾——但没有另一位同等级别的人替我做担保，我的弹劾会像周敏的搜查令申请一样被'待补充'锁进系统的暗格里。除非——」陈队长停下，像是在组织一句特别长的句子，在他脑子里拧成麻花的，「——除非我能把K拉到法庭上，让他当着法官的面承认他资助了警队的内部人。那样的话——王副队就是他的共犯，不是我的副手。」

林夜缓慢地吐出一口气。「所以你需要我。」

「对。我需要一个记者——一个不属于警务体系、不受司法内部审批流程约束的人——把K从地下带进法庭。」陈队长把手伸进口袋，拿出一张旧照片——一辆被撞毁的警车，在地上烧成了一团黑色的金属轮廓。

「这个照片——是十五年前。那个跟王副队同班的警员——他是那个站在实验室门口的合影中被孔老师用手搭着肩的年轻警校实习生，也是爆炸发生后第一个驾驶警车进入爆炸现场的巡警。爆炸发生三十秒内——他的警车失控冲出了五十二米的直线距离，撞在码头的系缆桩上。他被从火焰中救出时，手里还握着一个从爆炸现场捡起来的、还在燃烧中的实验记录本。」

「然后呢？」

「然后他也失踪了。十五年了——他的档案被锁定在'未结失踪案件'。没有人能找到他的下落——因为没有人找。除了我。」`,

title:"老刘的档案",
npc:"老刘",
text:`报社的资料室在三楼走廊最尽头——一扇常年关着、门把手有些生锈的灰色铁皮门。里面的空间不大，但被老刘用三十年的时间塞满了从各处分拣出来的旧档案、剪报、和夹着回形针的文件袋。

林夜是在凌晨两点半进来的。他用老刘给的钥匙开了门——老刘在他出门前说了一句「别把我的系统弄乱」，然后挥了挥手让他自己去。

老刘的「系统」确实是一种东西。不是那个按编号、按日期、按字母顺序排列的标准化档案管理系统——而是他自己建立的一套混乱但有内在逻辑的「关键词联想索引」。靠墙的三个铁皮柜子里，存放着老刘退休前三十年间收集的所有未发表过的调查笔记。找资料的方式是翻开老刘桌上那本厚得能当砖头用的活页笔记本——找到相关的关键词——然后去对应的柜子编号里取文件袋。

林夜花了一个小时才找到他要找的东西。

柜子编号「F-09」。标签上老刘用圆珠笔写着：「江大实验室 2009 爆炸」。

文件袋里有一叠发黄的纸张。第一页是一份内部调查报告的复印件——林夜认识这个格式，这是市公安局内部调查报告的模板——但从来没有对外公布过。报告里的结论和报纸上完全相反：不是「实验失控」，是「外部入侵」。案发当晚，实验室的监控系统在三分钟之内被人为关闭，然后在爆炸发生后的两分钟重新开启。能做到这种事情的人——要么是实验室内部人员，要么有警方的技术支持。

第二页是一份采访记录。老刘采访了当时负责处理爆炸现场的消防队长。消防队长在采访中说了一个细节——被他从正式消防报告里删掉了的细节：「我们在废墟里找到了一台笔记本。里面的硬盘被物理砸碎了——不是爆炸造成的损坏，是用锤子之类的东西砸的。砸完之后还浇了某种化学溶剂，硬盘的碟片已经完全腐蚀了。这不是事故毁坏——这是有人销毁证据。」

最后一页——是两份照片的复印件。一份是江大实验室的集体照，十五年前拍的，一群穿白大褂的年轻人站在实验室门口，笑得无忧无虑。老刘在照片上圈出了两个人——「死者（女）」和「孔某」。

另一份照片——林夜把它拿起来对着台灯看了很久——是最近某个金融论坛上的新闻配图。图中一个西装革履的中年男人，站在讲台上，正在做一个关于生物医药投资的演讲。老刘在这张图上也圈了一个圈——圈里是讲台下面的角落里，一个戴墨镜的、站在暗处的男人。老刘在照片空白处写了一行字：「这就是他。我在上个月的投资论坛上亲眼看到了他。他在。」

K。他没有消失。他一直都在。

只不过他有足够的钱、足够的权力、和足够的耐心，让整个世界都以为他已经不存在了。`,

"node_21":{
title:"K的过去",
npc:"旁白",
text:`苏晚在F-03货梯的配电间里发现了方远的工具箱。一个绿色的旧铁箱——箱子里面堆满了电工胶带、绝缘钳、各种型号的螺丝刀、和一卷用了一半的三号羊皮纸。羊皮纸上写着方远在最后一次逃跑之前给后来的潜入者留下的最后一张纸条。

纸条上是这样写的：「你们到了——我不在了。我在B区档案室和C区监控中心都留了备份数据。但我在最后一次逃跑中把A区通风管的左侧支撑杆锯断了。修复它需要大约一个半小时的电路工作——因为这个通风管下有一根独立的压力传感导线，如果压力下降，监控中心会立刻报警。修复工作没有捷径——它需要一个人在这里用绝缘钳从下面把断了的接口拉上去的同时，另一个人用导线夹具把上面接好的新夹子从通风管正上方往下扣住。你们必须几个人一起配合——一个人拉，一个人扣。如果有第三个——帮忙打手电。」

林夜看完纸条，沉默了几秒——然后把他用瑞士军刀改了的那台配电装置从背包里拿出来了。「改装——用继电器模拟压力传感器的正常信号。我可以在这里发一条虚假的正常压力数据给监控中心——然后我们把A区通风管的左侧支撑杆锯断再修复就没有压力报警。需要大概二十分钟。」

苏晚拿起方远的工具箱，然后把那张羊皮纸翻到背面——背面是一张地下管道的全貌草图，草图右下角画着一个小小的笑脸。笑脸的画法很粗糙——一个圆，两个点，一条弧线——那种在孤单到极点之后决定自己搞个笑话给自己笑的画法。

「他在这里待了八个月——画了这么多图纸，还给自己画了一张笑脸。」苏晚把羊皮纸重新叠回原来的折叠线，然后轻轻地放回铁箱里。

林夜开始了电路工作。把继电器的四条导线接到A区通风管压感板下方的四方端子上——一条一条，不能接错。接错意味着发送给监控中心的信号会显示异常波动——然后整个地下安全系统会在十秒内启动锁定模式。

他的手不抖——不要问为什么。在手铐锁片的声音被对讲机撕碎过、在配电间里被当成老鼠让保安嘲笑了半分钟之后、在从囚室里用一把瑞士军刀和消防水管螺纹钢管撬开了观察窗的铁网框架之后——人类的手在这种条件下已经分不清颤抖和稳定了。它们只是动。

二十分钟后——A区通风管的压力传感系统在监控中心的系统终端上显示的数值稳定在了正常范围内。

林夜和苏晚在通风管下方交换了一个眼神。然后——他爬进去，她跟在他后面。`,

"node_22":{
title:"苏晚的反常",
npc:"苏晚",
text:`苏晚已经有四天没有回林夜的短信了。

以前不会这样。做他们这一行的，保持通讯是铁律——尤其是当你的搭档独自暴露在危险之中的时候。林夜发的三条信息——第一天晚上：「明早码头碰头。有新线索。」第二天中午：「你还好吗？回个话。」第三天上午：「苏晚——你在哪儿？」——全部显示「已读」。已读，但没有回复。

第四天，林夜决定直接去警队找她。

刑警队的办公室在市公安局大楼的三楼——一条狭窄的走廊，两排灰色的铁门，每扇门上都有一块被反复擦洗之后显得发白的透明塑料牌。苏晚的工位在走廊最靠里的一间——她跟陈队长共用一个办公室。

但今天她的椅子上坐着一个不认识的年轻警员。

「苏晚？她被借调到市局行政科了。」年轻警员头也没抬，「说是临时任务。王副队安排的。」

林夜的后牙咬紧了。王副队。又是王副队。

他找到了行政科——三楼拐角处，一间比刑警队办公室大三倍的房间。苏晚坐在靠窗的工位上，面前堆着一叠需要整理的内部文件——不是案件档案，不是调查报告，是处室车辆使用登记表、会议签到单、空调维修申请。

「你被调走了。」林夜站在她面前。

「我知道。」苏晚没有抬头看他的眼睛。她的声音很轻——像一个人刻意压制着什么。「行政科也需要人。我只是临时帮忙。」

「你被调走是因为你在查镜中人俱乐部。王副队把你调去行政科——让你整理这些——」林夜用手指敲了敲桌上那叠登记表——「就是为了让你闭嘴。而且你知道。你只是装不知道。」

苏晚终于抬起了头。她的眼睛里有一种林夜从来没见过的表情——不是恐惧，不是愤怒，而是一种更复杂的东西，一种在玻璃后面看着你、而你永远碰不到她的距离感。

「林夜——有些事情我现在不能说。不是因为我不想说。是因为说出来的后果，我来不及收拾。」

她站起来，拿起桌上的文件夹，从他身边走过时停了一秒。

「去找陈队长。不是明天——今天。问他十年前江大实验室的那场火灾。」

然后她走了。走廊里只剩下她的脚步声和空调的嗡嗡声。`,

"node_23":{
title:"内鬼浮现",
npc:"陈队长",
text:`陈队长在凌晨两点十分打来了电话。

林夜正趴在报社的办公桌上，电脑屏幕上是一篇关于镜中人俱乐部慈善晚宴的报道草稿。他接起电话——陈队长的声音不像往常那种疲惫的、被生活磨平了棱角的声调。这次是冷的。尖锐的。像一把刚从抽屉里取出来的手术刀。

「王副队今晚跟俱乐部那边通了三次电话。」陈队长没有寒暄，直接切入了正题，「第一次——晚上八点十五分，通话时长四分半钟。第二次——九点四十分，两分钟。第三次——十一点零二分，三十七秒。」

「你怎么知道——」

「我让人监控了他的手机。合法监控——我已经申请到了市局内部调查的授权。你知道他在电话里说了什么吗？」陈队长的声音压低到几乎像是耳语，「他说：'K要的那批新货已经到位了。下周动手。'」

「新货？」林夜的手指僵在了键盘上。

「活的。」陈队长吐出了这两个字，每一个都像在咬碎一颗玻璃球，「王副队要从市收容所和流浪者救助站里挑人。流浪汉、离家出走的未成年人、那些没有家属报案的人。消失了也不会有人发现的。K需要新的实验对象——因为上一批的存活率不到百分之四十。」

林夜感到一阵强烈的生理恶心。他站起来，走到窗边，把窗户推开。凌晨的冷风灌进来，吹得桌上的纸张哗哗作响。他的手指在窗框上攥得发白。

「还有一件事。」陈队长的语气变得更重了，像一个人在抬起一块他不想抬起的石头，「你那个搭档。苏晚。」

「她怎么了？」

「她的档案我看了一遍。苏晚确实是周敏的妹妹——这一点她没有说谎。但五年前，苏晚因为伪造身份文件被行政拘留过十五天。」陈队长顿了顿，像是在给接下来的话积蓄力量，「那个案子的具体承办人——是王副队。」

电话两端都沉默了。

窗外的风更大了。林夜看着街道对面那家二十四小时便利店的蓝色招牌在风中摇晃。苏晚认识王副队。五年前就认识。她从来没有提过——不仅没有提，她甚至刻意把调查方向引向了其他警队成员，唯独避开了王副队。

text:`地下二层走廊里，林夜和苏晚——在这条两侧堆满废弃设备和漏水混凝土的窄走廊里——第一次同时面对面的遭遇。

「监控中心。三十七分钟——我们一起。”`,

text:`第二次潜入和第一次完全不同。

第一次是盲目的——凭着一股冲动、一张从叛逃研究员手里拿到的管道图、和半夜三更在旧码头上赌命的莽撞。这一次不一样。这一次林夜带着计划。

三天前，陈队长在码头东侧的蓝色集装箱里给了他一份警方内部的地图——不是官方地图，是陈队长动用三十年积累的私人渠道、从一个前市政规划工程师手里买来的地下管网图。图上标出了整个旧码头区的污水、暖气、和通讯管线的布局——而这些管线，与方远U盘上的管道图拼在一起之后，呈现出一幅完整的画面：镜中人俱乐部的地下设施根本不是孤立的建筑。它是一个经过精心规划、利用了旧码头地下防空洞网络扩建而成的三层地下堡垒。

「你要从下水道进。」陈队长用一根手指点着地图上的一条标注——一条虚线，旁边写着旧标号「巡检排水管 182」。

「下水道？」

「旧码头区的排水系统是六十年代修的——那时候的工程设计保守到荒谬，主排水管直径一米五，足够一个人弯腰走过去。这条管道——」他用手指沿着虚线划到地下实验室的C区外围——「在这里跟他们的污水管线交汇。交汇点有一道铁栅栏——按照图纸，已经锈穿了。锈穿的位置在地下三层停车场的南侧角落。从那里走楼梯上两层，就是B区。」

林夜记下了所有的路线。今晚，他穿了雨裤和胶鞋——不是防雨，是防污水。他戴了一顶有头灯的头盔，把手电筒系在手腕上作为备用。

凌晨一点整，他在旧码头西侧的排水口掀开生锈的铁盖，沿着生锈的铁梯一步步降入地下——进入了由水流声、霉味、和伸手不见五指的黑暗组成的地下世界。污水管里的水只有膝盖深，但水流很急，每一步都需要把脚趾扣进鞋底、对抗水流的推力才不会摔倒。墙壁上覆盖着一层暗绿色的苔藓——摸上去滑腻腻的，像是某种活着的、呼吸着的物质。

他沿着管道走了将近四百米——每一步都在心里倒数——然后前方出现了那道铁栅栏。锈得一塌糊涂，左下角的铁条已经融成了一团褐色的铁渣。他用力踹了一脚——又踹了一脚——然后整个铁栅栏的下半部分松动了，哗啦一声倒在污水里。

铁栅栏的背后——就是地下停车场南侧角落的入口。`,

npc:"旁白",
text:`地下通道的结构比管道图上的要复杂得多。方远的管道图标出了主要通道的位置——但他没有标出那些小型分支通道。它们是焊在主管道侧壁上的——直径只有半米的圆形金属管，原本是通风管道的一部分，但被K的工程团队改造成了紧急避让通道。

林夜从B区档案室出来后不得不用到这些小型通道。因为走廊两端同时出现了两组巡逻保安——一组从南端的值班室出来，一组从北端的电梯口下来。他们在这个时间点巡逻是常规还是因为他被发现——他不确定。他选择不确认——选择了那个直径仅半米的金属管。

他在黑暗中匍匐前进——金属管的内壁覆盖着一层细密的油污，抓在手里滑得像鱼鳞。管道的直径之窄——他的肩胛几乎每前进一寸就要蹭一下内侧的金属壁。如果他在管道里被堵住了——他的身体会变成一个塞子，把这条唯一通向后排储藏室的通风管堵死。他会死在这里——被闷死，或者被找到之后被注射C-11。

但方远的管道图上有一个标注让他继续向前——「通风管H-12 — 出口位于B区后侧储藏室。该储藏室与监控中心仅一墙之隔。从储藏室出来后沿北侧维修通道上二楼，可直达停车场南端。」

他匍匐了大约四十米——每一米都像一公里——然后从管道出口翻了出来，落在一堆旧文件箱的背后。储藏室里很暗——只有头顶巴掌大的通风口透进来一丝微弱的光。这缕光是他的导航员——他跟着光爬到储藏室的北侧墙壁，贴墙站着，可以听见隔音效果不理想的墙壁另一侧传来了监控中心值班人员的对讲机对话声。

「B区3号走廊，检测到移动。可能是清洁工——也可能是访客。请确认。」

三分钟。

林夜把U盘重新塞回雨衣内层。然后他沿着北侧维修通道往上走——每一步都是被心跳驱动着的。维修通道的楼梯非常窄——只能一个人侧着走，而且台阶的混凝土上面布满了裂缝，每踩一步都有细小的石子往下掉，掉到下一层的地面上发出像硬币弹跳的声音。

他走完了楼梯。推开最后一扇防火门——停车场南端。凌晨的空旷停车场里只有他自己的摩托车还停在角落里。他的身体在发抖——从通风管道里带出来的冰冷的机油让他的雨衣里层湿了一层——但他的手是稳的。

他的口袋里——U盘、实验记录的照片、录音笔里的K的独白——今天带出来的这些东西，够他用来写下一章了。`,

"node_27":{
title:"K",
npc:"K",
text:`地下二层的中央实验室是一个巨大的圆形空间——直径目测超过三十米，天花板的高度比外面任何一层都要高，因为这里的上方是俱乐部一楼的地基，中间隔了一层钢筋混凝土板。空气里混着无菌实验室里那种特有的化工气味——酒精和某种不清楚名字的试剂蒸发之后的味道。

林夜从通风管道里钻出来——管道出口的边缘锋利得像剃刀，在他的小臂上划了一道。他蹲在出口下方的角落里，背靠着冰冷的混凝土柱，从阴影里往外看。

K就站在实验室的正中央。

在林夜的想象里，K应该是一个像黑帮老大一样的人物——穿西装、戴墨镜、身后站着一排穿黑衣服的人。但他看到的不是这样。K穿着一件白色的实验服——不是披在肩上的那种高层管理用的实验服，是真正沾着化学试剂痕迹、袖口卷到前臂的实用型白袍。他站在实验台前，左手拿着一把移液器，右手握着一支马克笔——正在某个实验记录单上做标注。

他的左半边脸颊上有一道烧伤疤痕——从嘴角一直延伸到耳根，皮肤在新伤组织和旧皮肤的交界处形成了一道不规则的、像被拉丝的塑料一样的沟壑。但右半边脸——完好无损。轮廓笔挺，眉毛浓密，从右边看——这是一个标准的、照片上的好学生的相貌。

林夜想起了老刘档案里那张十五年前的合照——一群年轻人站在江大实验室门口的合影。那个站在中间的年轻人，脸上没有疤痕，笑容明亮，一只手搭在那个女生的肩膀上——那个女生在三天后死于那次无法逆制的神经实验中。

这个实验室——这个地下世界，这个由一百三十个实验对象和一排排脑CT扫描图组成的地下世界——都是从那双手搭在一个女生的肩膀上那一瞬间开始的。

「出来吧。从柱子后面。」K的声音在空旷的实验室里轻轻地回荡——他没有回头，甚至没有停下手里的笔。

林夜的血液像是被冻住了。

「我已经注意你很久了。」K用那支马克笔在记录单上做了最后一个标注，然后把笔帽扣上——发出一个干脆的、像手枪上膛一样的咔嗒声。他把试管注射进实验台上的第一排玻璃架子里，右手轻轻拍了拍白袍上的灰——一个完全多余的、完全机械性的、像是在拖延着什么的手势。然后他转过身。

「林夜——《江城晚报》的记者。你是我这位实验室的'第一位访客'。」

不是第一次被闯入，不是第一个入侵者。客。

K说这个词的时候，声音里没有任何嘲讽——但那种缺失嘲讽的平静反而更让人脊背发凉。因为这意味着他知道林夜要来——他知道他从哪个入口进，知道他在地下走了多久，知道他到目前为止做得算不错——但他不在乎。

「你不在乎我在这？」

「你可以继续做你的事。」K把手插进实验服的口袋里，从实验台后面走出来——他的步伐很慢，脚上穿着一双实验室专用的白色布鞋，每一步踩在大理石般光滑的地面上几乎没有任何声响。「我知道你带了录音笔。那支在旧码头上花了三十块钱买的瑞士军刀——在你左边口袋里。那支U盘——是方远给你的吗？我可以看出来是——因为那是一个加密存储器，里面的数据附带时间标记——九月十三号。那一天方远逃走了。那一天我下令抓捕他。」

「所以你为什么不抓住我？」

「因为你比他有新闻性。方远——不需要审讯，他在叛逃之前就已经写好了认罪书放进自己的抽屉里。但你——」K终于停在林夜面前三步远的位置。他的烧伤疤痕在实验室的无影灯下变得更加清晰——不是恐怖，是某种不可逆的烙印，像一块被烧得变了形的金属「——你是一个记者。你不会认罪。你会把这一切写出来。」

「你不怕？」

「怕什么——你写出来之后，能承受得住后果的不是我，是你。」K微微抬了一下下巴，「现在——要不要来看看我的实验？」`,

title:"警报",
npc:"旁白",
text:`警报声是从头顶的扬声器里炸出来的。

不是普通的消防警报——是一种高频率的、像指甲刮过玻璃一样的尖锐嘶鸣，在每一根神经末梢上划过去。红色的应急灯在走廊天花板上疯狂旋转，把整个地下空间染成一片令人眩晕的血红色。阴影在墙壁上扭曲、拉长、分裂，像一群受惊的蛇。

对讲机里传出了嘈杂的通话声——混乱的、重叠的、带着紧张和恐惧的声音：「B区发现异常！B区发现异常！不是工作人员！」「重复——入侵者在地下二层，B区档案室附近！」「全部安保人员前往B区集合！快！」

林夜的心脏几乎要从喉咙里跳出来——不是因为害怕，而是纯粹的生理想应：肾上腺素的冲击让他的视野边缘开始收缩，手指尖变得冰凉，但大脑却在以一种病态的清醒高速运转。他听到了电梯启动的声音、楼梯间里多个人同时跑动的脚步声、还有对讲机里不断传来的指令。

他现在在C区和B区的交界处——距离最近的出口有两条走廊和三个转弯。身后的脚步声越来越近了，至少有四个人，其中两个带着手电筒——光柱在地面和天花板上疯狂扫动。

他需要立刻做决定——不是选择要不要跑，而是往哪里跑。

方远的U盘里有一张地下设施的管道布局图——林夜在今晚出发前花了整整一个小时把它记在了脑子里。维修通道。C区的尽头有一条维修通道，管道直径大约一米二，可以匍匐通过。通道的另一端通向地下停车场的通风井——距离地面大约六米，跳下去可能会摔断腿，但不会死。

他按下了耳机的通话键。「苏晚——我被发现了。你从B3出口撤。汇合地点改到码头东侧的集装箱区——就是我们来的时候看到的那个蓝色集装箱。如果十五分钟内我没有到——你自己走，不要等。」

耳机里传来了电流噪音。没有苏晚的回应。

林夜又按了一次通话键。「苏晚？苏晚——你听得到吗？」

"node_29":{
title:"黑暗中的逃亡",
npc:"旁白",
text:`林夜从暴怒的保安队长眼皮底下滑入了另一条走廊。这一次没有任何计划——只是往前跑，跟着每一寸没有被强光照到的地方，像一只在地下洞穴里被光追着跑的老鼠。

他跑过C区走廊——身后是接近十几个快速接近的脚步声和时不时在墙上反弹的对讲机蜂鸣。他的腿在烧——从B区档案室到这里的距离大概是四百米，但在地下通道中全部是窄廊、转弯、和需要弯腰通过的管道口。跑了四百米的地道运动——每一块肌肉都在喊停。

但周敏的数据还在他口袋里的U盘上。照片还在。K的独白还在。

他不能停。

左转。维修通道。一道闸门——手动关闭装置，把手位置在右脚膝盖高度。他用尽全力转动把手，然后整个人在地面上滑过去——闸门在身后降下，把最近的那个保安拦在了另一侧。

但前面的路仍然漫长。C区的维修通道通往停车场的路是直线方向——但在地下，直线的概念是一个理论概念。墙壁转角、废弃设备的堆积、局部塌陷的水泥天花板——所有这些都要在黑暗中规避。

他走了将近二十多分钟——在黑暗中。唯一的光源是他左手腕上绑着的那只手电筒——电池开始了低电量警告，光柱越来越微弱，变成了一种不稳定的、像是快要咽气了的橙色。

然后——他听到了水声。

不——不是水声。是水流声。哗哗的水声从左侧墙壁的背后传出来——这是地下排水主管的声音。按照陈队长的市政管道图，这条主管直接通往旧码头外的江边排水口。

他沿着墙壁摸索——终于找到了管道图上标注的那道已经锈穿的铁栅栏。他用已经消耗殆尽的力气把铁栅栏的下半部分再次撞开——上一次进来的铁栅栏。然后连滚带爬地钻进排水中——冰冷的地下污水瞬间浸透了他的全身。

但铁栅栏的另一侧——就是江边排水口。就是地面。就是天空——虽然今晚没有星星，但那是真正的、不是由无影灯模拟出来的天空。

他从排水口里爬出来——像一个被下水道分娩出来的畸形的孩子——跪在旧码头的碎石地面上，大口大口地吸入带着江风的空气。

他的雨衣里层——U盘、录音笔——没有被水浸透。防水袋发挥了作用。

远处——在码头另一端——苏晚的深蓝色轿车的尾灯在黑暗中闪烁了一次。是信号——她还在等他。`,

"node_29b":{
title:"赌注",
npc:"K",
text:`白小姐在VIP包厢里设了一张赌桌。不过今晚桌上的赌注不是牌——牌在桌子底下，被烟灰缸压着。桌上的赌注是一份打印出来的实验对象编号清单，K的签名在底部每一页都印得清清楚楚。

她邀请林夜坐下来——不是因为信任，是因为她有话要说，而在VIP包厢里说她自己的客厅有监控（尽管是她自己装的），她选择在一个K永远都不会进来、也没有监控摄像头的赌桌房间里说。

「你今晚来俱乐部——不是来做会员的吧？」她的手指在清单上轻轻划过，像是在弹奏一道无声的音阶。「你在找什么——我猜，是地下的人？」

林夜没有承认也没有否认。他只是把双手交叉放在桌面上，看着她的眼睛。这是他在这家俱乐部里学到的——在镜中人俱乐部里，承认和否认都没有任何意义——在这座俱乐部的地下，所有答案在你说出来之前就已经被写在了单向玻璃的另一侧。

「我跟K十五年了——」白小姐说，声音没有起伏，像是在读一份陈旧的日记，「十五年前的那场爆炸——你们档案馆可能还有旧报纸。实验失败，他的女朋友死了——其实不是老板的女朋友，是K的合作伙伴和爱人。她叫孟小禾——二十五岁，神经生物学博士在读的最后一年。爆炸发生的时候K在外面接电源——她在实验室里调配方。数据失控，烧起来——他跑进去但没来得及。」

白小姐把他手里一直没点燃的香烟夹在食指和中指之间，翻了一面，重新翻回去——这个动作像是某种焦虑的自我安慰仪式，做了十几年，已经跟情绪无关了。

「爆炸之后他就变成这样了。他说孟小禾没有完成她的实验——他要替她完成。不是为了纪念——是为了让她的死亡变成'有代价的牺牲'而不仅仅是'事故'。你知道一个人用十五年去说服自己接受一个谎言之后，那个谎言对他来说已经不是一个谎言了——它是在他那半边烧毁的脸上唯一存活的皮肤。」

「那你为什么还在这里？」林夜问。

「因为我是这个谎言的共犯。」白小姐没有逃避这个答案。她说得很平静——比平静更平静，像是在回答一个已经问了自己无数遍的问题，答案已经在她心里磨成一个钝角了。

「你想让我停下他——我不知道怎么停。但如果你能找到一种方式——我可能会闭上眼睛。」她站起来。这句话不是说出来的——是她的背影在说出来的。她背对着林夜向门口走去，脚步没有停顿。

在她关上门之后，林夜拿起了桌上那个装实验清单的文件夹。背面贴着一张小小的便签——白小姐的字：「#132 — 今晚到。城北流浪汉营地 — 凌晨两点。」`,

"node_30":{
title:"K的提议",
npc:"K",
text:`「你刚才说——如果我想的话，我可以留下来。在你这里。」林夜把自己的背离开柱子，让自己完全站在K的视野里。在地下无影灯的光照下，他的灰色雨衣像一块从混凝土墙壁上临时撕下来的阴影。

「对。」K把移液器放回架子，把手套摘下——一根手指一根手指地，很慢，像是这个慢速也是一种他的研究对象的习惯。「你知道我的实验室现在最缺什么吗？不是钱——我有资助者。不是技术——我的配方在十五年前就成形了。我最缺的——是一个把这一切写进一本书里的人。不是记者那种'深度报道'——是纪实文学。完整的。你写出来的东西——你的文笔、你的角度、你的在调查过程中经历过的一切——可以让整个世界重新审视神经科技进步的伦理维度。你愿意的话——我可以给你独家素材。」

「让我做你的宣传部长？」

「你自己决定做的是什么。我的条件是——在实验完成后的两年之内，你不需要发稿。两年——我用两年把C-11稳定下来，让它不再误伤记忆。然后你可以发表任何你想发表的东西。但在此之前——你不能曝光这个实验室。」

林夜低头看着自己的手。这双手刚才在地下档案室的屏幕上拖动了一个数据表——一百三十个受试者，其中六十七个已经死了。这双现在还在轻微颤抖的手，几个小时后要为周敏拍下最后一张照片，不管她是活着还是已经不在。

「给我两年——」K重复了一遍，然后他做了一件林夜完全没有预想到的事情：他把自己的实验服口袋里的笔记本抽出来，翻开到第78页，把它放在林夜面前。

笔记本第78页上是一份手写的名单——十二个名字。每一个名字旁边标注着年龄、既往病史、和「计划注射日」。最底下有一行标注用红笔圈着：「向市收容所申请冻结。」冻结——意思是不再从收容所输送新实验对象。

「这是我的妥协。」K把他的笔在桌面上按下——发出一个干脆的咔嗒声，「我再做十二个人。十二个——样本够了，我就量产。量产之后M-724可以在任何一家医院买到——那些创伤后应激障碍的病人，那些被强奸之后无法正常生活的女人，那些在战场上回来之后每天晚上都在一点一点失去自己的退伍军人——都成为我的帮助对象。但前提是——我需要十二个样本。不是六十七个。是十二个——然后停下来。」

林夜看着那张名单。十二个名字——全是从收容所捡来的被遗忘的人。没有家庭，没有背景，没有在失踪名单上被登记的可能。

「你的实验完成之后——这十二个人，你打算怎么还给他们？」

这个问题像是一颗石子掉进了一口深井——井口很小，但石子落下去的回声一层又一层地推上来，在这个装满仪器的地下空间里绕了三圈。

K没有立即回应。他的烧伤疤痕在无影灯下变成了一片苍白的光晕——那道沟壑是在十五年前他为抢救她而冲进那个正在燃烧的实验室之后留下的永久纪念。她的配方，她的数据，她的死。他不是一个人造的恶魔——他是一个被自己的年轻、才华、和对一份配方完成度的执念，一点一点掏空了良知的人。

「还——是你们的问题。我只负责让配方不再伤人。剩下的——」K把笔记本合上。"「是法庭的问题。」`,

"node_31_cooperate":{
title:"合作的第一步",
npc:"K",
text:`K把一份文件推到了林夜面前。文件的封面是一张灰色的牛皮纸，上面没有任何标识和文字——但林夜一眼就认出了这种纸。他在报社见过——这是军用级别的保密文件用纸，正面反光，背面哑光，用普通复印机无法复制。

「打开看看。」K的语气像是在请人品尝一道新菜。

林夜翻开封面。第一页是一份「M-724项目第三阶段实验报告」。报告里的数据让他这个外行人也能看明白一件事——M-724确实有效。在一百三十名实验志愿者中，有百分之六十七的人在注射后成功清除了指定的创伤记忆。包括一名在火灾中失去了孩子的母亲——她在那之后第一次睡了整整八个小时的觉。

「百分之六十七。」K说，「这是医疗史上任何抗抑郁药物都无法企及的治愈率。但社会不会允许它的存在——因为在另外百分之三十三的案例里，发生了不可控的记忆损伤。无关的记忆被波及——生日、亲人的面孔、自己的名字。媒体会抓住这一点，把它妖魔化。而这三个人——那百分之二——会在实验过程中死亡。」

「你在合理化谋杀。」

「我在权衡利弊。」K的声音平静得像一杯放置了一个小时的白开水，「任何医疗进步都有代价。抗生素在普及之前杀死了多少人？疫苗在完善之前引发了多少事故？你之所以觉得我不能被原谅——是因为我的实验对象还没有多到可以形成一个统计学的分母。仅此而已。」

林夜盯着文件上的数据。一百三十个人——一百三十条人命被压缩成了三页纸上的几个百分比。他感到愤怒——但他也感到一种更危险的、他不想承认的东西。K说的逻辑，在某种程度上，是可以自洽的。

「你要我做什么？」

「写一篇报道。」K从抽屉里取出另一份文件——这次是一份新闻稿的框架，「正面报道。把M-724描述为'一项尚在早期阶段但前景广阔的研究'。你需要引用刚才看到的正面数据——但不要提副作用，不要提死亡案例，不要提任何可能引发公众恐慌的细节。你给这个项目制造一层合法的外衣——作为回报，我放苏晚自由。你的搭档，林夜——活着离开这里。」

他把一支笔放在文件旁边。

「签个字。我们就开始了。」`,

title:"表面应允",
npc:"K",
text:`「好。」林夜说。这个字从他嘴里出来的时候——他自己都有些意外。

但这不是投降——是他马上意识到K的房间里有三个监控摄像头，每一个镜头上方的红色LED灯都是亮的。他现在拒绝K的提议，结果就是被安保带出去——不是活着出去，是像方远第三次逃跑被抓之后那样，被锁在B区的第二层囚室里做下一个实验对象。

但如果在K面前先答应——他可以争取时间。

「我愿意留下来。给我一个月——我想把这件事的原貌写清楚。十五年前的那个实验——你那个女朋友。那条配方的真实原理。还有这些年在收容所里的那些编号。」林夜让自己的声音听起来不像在接受提议，更像是在部署一次采访。这能让K相信他的诚意——因为一个记者，在调查到故事的核心点时，很难不想要继续写下去。

K看了他三秒钟。「你很有故事感。可以——但你的出稿需要经过我的审查。任何可能定位到实验室所在地的细节——都不能发表。任何提到具体姓名的——必须使用编号代替。你同意？」

「我同意。」

K点了一下头。他从实验服口袋里取出一张卡片——一张印着「镜中人俱乐部 内部通行证」的白色卡片——放在林夜的手掌上。卡片背面写着权限级别：「B-02」。B-02级别的权限不能进VIP包厢，但可以在一楼酒吧区自由活动，也可以访问地下B层非敏感区——档案室除外。

「明天下午三点，我会派人带你参观实验区。之后——你可以开始你的创作。」K把他的白大褂挂回墙壁上的衣钩上，转向实验室中央的控制台。他在控制台屏幕上输入了一串密码，然后从打印机吐出了一张全新的实验对象编号清单。

林夜在他的余光里看到了那张清单的标题——「C-11 Phase 4 受试者编号清单」。周敏——#130——如果这份清单上有她的编号，说明她今晚的第五次注射是今晚。

「我明天早上给您呈交第一章提纲。」

K没有转身，只是把那只没有烧伤疤痕的手举起来——在空中挥了一下。

林夜从实验室里走出去。他沿着走廊往电梯方向走，走得很慢——因为他需要记住这一切。他在心里重复着通道的位置、电梯的方向、走廊尽头的岗哨人数。他的表面身份是K的合作者；但他的真实身份——仍然是记者。`,

"node_31_resist":{
title:"拒绝",
npc:"旁白",
text:`林夜看着K伸过来的手——没有握。

那只手在半空中停留了两秒钟，然后缓缓收回去了。K笑了笑。他笑起来的时候没有声音，只有嘴角的肌肉往上牵动了一丝弧度，像是脸上贴着的一层薄薄的胶片被空气顶起来了一下。

「你还是那个记者——对吧。那种会把一篇稿子改了六遍、然后因为主编的一句话又从头重写的人。」

「我改六遍，是因为我希望每一个字都站得住。」

「但没有人读啊。你写一万字——真正看完的，不到一千人。你看我——两毫升M-724，能让人永远记住一个他从来没经历过的事情。不是数据——是感觉。气味、温度、光线——全部存在于大脑的每一个突触里。你写了三年——不如我们两滴。」

「那周敏呢？」林夜的声音在不大的实验室里回荡——他的耳朵里仍然灌满了刚才在档案室看到的那些CT扫描图上的灰白色的侵蚀，「你在她身上做了十六次注射——每一次剂量递增，每一次脑区活动都在萎缩。她现在不记得自己妈妈的脸。她的妹妹在医院门口等了三天——她认不出她。这是你说的'比一万个字强'？」

K沉默了片刻。他把手重新插进风衣口袋里，走到实验台前，拿起一支已经封装好的注射剂——淡黄色的液体，在手电筒的余光下折射出琥珀色的光泽。

「C-11新配方——这周才开始给周敏注射的。你知道吗——这不是现在市面上任何已知的神经抑制剂。这是我花了九年时间重新配的东西。如果再做两个月的实验——我想我能稳定它。然后它就不会再误伤无关的记忆了。它会有医学用途的。」

「你还需要多少人来完成那两个月的实验？」

K回过头来。他的眼神里有一种很奇怪的东西——不是疯狂，不是冷酷，是那种「我知道你有道理，但我已经走得太远了」的疲惫的沉没。

title:"报道与暗语",
npc:"旁白",
text:`星期三早上，林夜从镜中人俱乐部回到报社，然后做了一件所有人都没有预料到的事——他开始写报道。

不是那篇深度调查——是一篇关于旧码头区地热资源勘探的商业报道。这是他和苏晚在码头上设计的暗语系统：他在报纸上的每一个商业报道都不是它看起来的表面内容——每一篇都在用一种只有苏晚、陈队长、和方远才能解读出来的暗语符号传递信息。

比如说：地热资源钻井项目的「预期产热率」数值——这个数字实际上对应的是地下B区下周的保安换班频率。如果是「3.2兆瓦」——那意味着三班保安中只有两班在值。如果是「1.5兆瓦」——那一班都没有了，是全面潜入的最佳时机。

他在写报道的时候，背后的新闻编辑室里依旧弥漫着下午两点的沉闷——排版员在赶制明天的印刷版，广告部的人在一遍又一遍地打销售电话。唯独老刘什么都不做——他坐在角落里，抽着一根不点燃的烟，看着林夜在键盘上飞速地打字。

「你那篇商业报道——是给谁看的？」

「给你退休之后看。」林夜笑着说。这是真的——老刘退休之后确实会收到这份报道，但首先收到的是苏晚。

下午四点——报道发排。四点零七分——苏晚收到了。她用的是报社的在线订阅读者账号——外人看不出她是警察，系统只会显示一个名叫「苏女士」的普通订阅用户。

她迅速解码了报道中的暗语：「下周二凌晨两点至四点半——三班/两——F-03窗口——档案室可入——新一批实验对象今晚到。」

她对着屏幕默了一遍。然后她拿起手机——拨了陈队长的私人号码。

「老陈——下周二。从F-03进。我要你调一辆没有警标的运输车，在码头西侧的三号仓库门口等待——我需要一个能装下至少十二个人的车厢。」

在那辆运输车到达之前——那些在那辆面包车里被送到俱乐部的、没有名字的收容所编号——今晚还不知道自己将在下周二重获自由。

但林夜在写完这篇暗语报道之后没有关电脑。他打开了另一个文档——标题是：「关于镜中人俱乐部非法人体实验室的完整证据链」。他一边写一边复听着录音笔里K的每一句话。他写得很慢——不是因为谨慎，是因为他在写的这个文档，如果出了错——无论是在打字阶段还是传送阶段——K会在他把这篇底稿发出之前处理掉他。他知道这一点。所以他必须在每一句话的前后两遍检查——确保措辞在法律上站得住脚，信息来源不会暴露线人，描述细节不会在无意中披露地下实验室的精确地理位置——以免被K的团队用作反制证据。

午夜一点，他写完了。他把U盘的副本分了三份——一份送到报社保险柜，一份寄到湖城市检察院的信箱里，一份留给苏晚。然后他去冲了一杯速溶咖啡——在他出租屋里唯一的那张小木桌前坐下来。

在这个城市里，在明天之前——只有这一杯咖啡知道他在今晚写下了什么。`,

text:`王副队的证词在陈队长提交内部弹劾的第二天就被锁定在了系统里的「等待补充」。这在林夜的预料之中——他和苏晚早就在码头的集装箱办公室里做出了备用方案。

四十八小时之内，五遍。林夜把自己在出租屋里锁了整整一天来写完这五站需要提交的材料。他的键盘敲打声在整个小房间里反复弹反射——像是某个人在一条空荡荡的走廊里举起一只手打在墙壁上的回声。

四十八小时后——要么K被逼到无处可退，要么林夜用尽了所有合法途径然后回去地底，做那个他一直没有告诉任何人的最后的预案。`,

npc:"苏晚",
text:`林夜被关在B2层最深处的一间囚室里——编号B-2-17。这间囚室的墙壁是用三厘米厚的铁板焊成的，门上只有一个小观察窗。观察窗的大小——刚好够一只睁大的眼睛从外面死盯着里面。

他被抓是在C区档案室门口——那个晚上，四个保安从两侧走廊同时堵住了他。他试图谈判——亮出记者证，说出记者的法律地位——但这一次没有人听。记录单上的文字显示他们得到了上层的口头命令：「入侵者直接关入B-2-17。等待K处理。」

那是三天前的事。

在这三天里，林夜总共吃了六次饭菜——每一次都是通过门下方的一块半卸钢板推进来的，饭菜是冷的。但他没有被动地等待。

第二天——他从囚室角落里的旧消防水管的连接口处拧下来一段螺纹钢管。这段钢管只有二十厘米长——不够做杠杆，但如果在管端卡上瑞士军刀的刀刃，可以做成一个临时撬棍。

第三天——他花了整整一天的时间，在所有人都以为他在里面安静地等待死亡的时候，他撬开了观察窗的铁网框架。然后他把手从那道狭小的开口挤出去——指甲全部挤断了——扭开了门外的机械锁栓。

林夜沿着那条他走了无数次的走廊——朝着B区档案室的方向。他不是空手出来的——他在那间囚室里为自己写下了一张纸条。纸条上记录了这三天的所有发现：铁门焊接弱点、值班规律、对讲机频率、以及从B-2-17囚室往北走十四步、再左转进入维修通道的避让路线。

他是一个被困在笼子里却在认真做田野调查的记者。`,

npc:"K",
text:`一个星期过去了。林夜每天早上九点整出现在镜中人俱乐部的正门口——穿着那件西装，怀里夹着一份打印好的章节提纲。他的'纪实文学'题目已经定好了：「记忆的年轮——一份神经序言」。K对这个题目很满意——他说「年轮」这个词用得好。

他不知道M-724会把这这两个字从她的记忆里移除得多快——但他做了。因为从日记里那个颤抖的笔迹里他知道——那是她最坚固的记忆。

今天，K让他参加了第一阶段实验结果的内部报告会。在报告会上，他看到了一组让他沉默的数字：C-11目前剂量在#130号受试者上的第五次注射后取得阶段性稳定。脑电图显示记忆清除范围和保留区域之间的分界线越来越清晰。

「这就是说——你的配方正在变得安全。」林夜在会后对K说。

「对。再有三个月——最多五个月。五个月之后——你的书就可以上市了。」

title:"出逃",
npc:"旁白",
text:`那个混凝土洞穴的深处有一个冰冷而强劲的通风口——通风口外面的世界是旧码头区西侧一处被遗弃了几十年的船坞里的一弯荒废的水洼。今晚，这弯水洼的边缘有一辆从报社借来的黑色轿车停在那里。

苏晚坐在驾驶座上。她看着手机上林夜在四十分钟前发来的最后一条信息：「B区监控中心后侧管道。在我前面。如果十五分钟内我没有出来——不走。你重复一次：不走。」

她没有回他——因为没有信号。地下在三层以下没有信号。但这条信息从地下一层靠着微弱的信号挣扎出来的时候，她知道他没有事。如果他没能发出这条信息——他就会在外面。

二十分钟之后，副驾驶的门被猛地拉开了。

林夜滚进来——满身泥水与机油，额头在撞击管道壁时磕出了一道细长的血痕。他的雨衣被撕得很碎——像一只被鸟巢里的铁丝网缠住了的夜鸟挣扎了出来。但他的U盘——还在他雨衣内侧的口袋里，数据完整。

「走了——快——他们在正门设了封锁线，但换班时间是三十分钟之后。如果我们在三十分钟之内穿过封锁线——」

「不走码头方向。我查了另一条路——沿着北侧防洪堤开三公里，那里有一条废旧的临时桥梁——去年市政部门把它改成了单车道通道，没有摄像头。」

苏晚没有等他回答——她挂了档，黑色的轿车从水洼的小路冲上了废弃船坞的空地，然后从一扇倾斜的铁丝网缺口里钻出了旧码头区。

码头在车后视镜里越来越小——然后消失——那道在今晚之前一直像一个不断蠕动的巨兽一样的钢筋水泥的轮廓。

「周敏在受试者编号第130。她的编号在死亡列表上是空的——但她在生还列表上也是空的。这是说明——她在记录出来的那一刻，还不是死，也还没有活着。她还在被注射——在等待下一个人来从注射室的铁门之外把她带走。」

「我们带不走她——」苏晚紧握着方向盘，「今晚——带不走。但明天——我们可以申请一个完整的突击搜查。」

「申请——如果王副队再次驳回呢？」

title:"警方的突击",
npc:"陈队长",
text:`凌晨五点四十五分——东方地平线上面还没有任何光。但旧码头区的整个西侧——在五分钟之内——被十六辆警车的前灯同时打亮了。

特警突击小组从两架警用直升机上沿着绳索滑降到镜中人俱乐部的正门和后门。陆上警队从码头东西两侧同时推进——从东侧包抄主入口，从西侧封锁排水系统，以防止有人从地下通过排水管道逃离。这是陈队长在递交正式指控申请之后，协同市特警支队和省公安厅特派组共同执行的联合行动。

王副队看到林夜的时候——没有惊慌，也没有拔枪。他只是缓慢地把手从键盘上拿开，转过身——然后给林夜倒了一杯已经冷透的速溶咖啡。

苏晚在囚室区撞开了周敏的铁门——是今晚同一时间撞开的第七扇门。周敏还蜷缩在同一个位置——金属床、塑料水桶、铅笔画了密密麻麻的计数——但她今晚手里攥出的不是被子，是那张写着「苏晚」两个字的小纸条。

纸条已经被揉得皱巴巴的了——因为她在过去的十几个小时里一直攥着它。

「姐姐——」苏晚跪在她面前，用被汗和地下水浸湿的手掌把她冰冷的手指包起来。

周敏的眼神像是在迷雾中挣扎了两三秒——然后她缓慢地、一个字一个字地读出了纸条上的字：「苏——晚。」

「是我。我来了。」`,

title:"双重真相",
npc:"旁白",
text:`在镜中人俱乐部合作一周之后，林夜获得了越来越多进入地下实验室核心区域的权限。今天——K允许他参观了实验对象接收室。

接收室位于地下二层B区的南侧——一扇没有任何标记的灰色铁门背后。铁门打开之后是一间二十平方米左右的、铺着白瓷砖的房间。墙壁上挂着血压计、心电图导线、和几排装着不同颜色药品的玻璃注射器架子。房间中央是一张金属床——和他在档案室CT扫描图上看到的那些约束床一模一样。

K从实验服口袋里拿出一份表格，递给林夜：「昨晚的新接收者——#132。」

林夜接过表格——他的眼睛从第一行数据扫下去：姓名栏空白——只有编号。年龄：22。来源：「城北收容所」。健康状况：「轻度营养不良，无慢性疾病记录」。

「我能不能——见见她？」

「她还在复苏室——第一次注射之后的副作用需要至少六个小时的观察。不过你可以看她今天早上的脑电图。」K把一台平板电脑滑过来——屏幕上显示着#132的实时脑电图波形。

林夜看着这些波形——波浪一样的蓝线在屏幕上上下起伏。这些曲线对他来说是抽象的数学对象——但K能看到更多。K用手指在屏幕右侧轻轻划过——那里有一个被标记为红色的热区，标注着「M-724局部响应浓度」。

「你看这里——」K的语气不再是平常那种有距离感的理性。他说得很快，眼睛里有一种说不清的、近乎急迫的光，「——额叶和颞叶之间的突触抑制非常均匀。比周敏第一次注射的时候要好得多。这说明——配方正在变得越来越精准。再有三到四批数据——我们就能达到临床应用的标准。」

「那你还需要多少个新鲜人？」

K没有回答第一个问题。他把平板电脑收回去了，把表格塞回抽屉里。然后他转过身——那个动作让他右侧没有疤痕的脸对着林夜。在没有疤痕的那半张脸上，林夜看到了一种让他心头一颤的表情：不是疯狂，不是狡诈——是真诚的热情。

「你知道吗——我从来没有想杀过任何一个人。」K说，声音比刚才轻多了，「那些死去的受试者——我的实验笔记上每一次有D标注的时候，我都会合上笔记走到走廊，一个人站十分钟。但你知道吗——我从来没有因此停过手。不是因为我没有感觉——是因为我在站完那十分钟之后回到实验室，每一次我告诉自己：'当你完成了它——它就不用再杀死任何人了'。」

林夜看着他。没有回应。因为这个逻辑是牢不可破的——从K的自我叙述的内部视角来看，是一个完全没有漏洞的伦理闭环。你永远没有办法和一个逻辑没有漏洞的人争论——你只能在他的逻辑外部建起另一套更强的逻辑。

林夜把那句没有说出口的话收进了心里：「你杀的人不是配方杀的。是你选择站在那十分钟之后不回头的那个瞬间杀的。」`,

text:`警方在地面上的突击没有成功封锁所有的排水出口。K——在水流声和碎石的回响中爬出了那条他已经用过两次的排水管道。一次在爆炸——一次在实验对象集体反抗那个晚上。这一次——他用一种瘦削到变形了的忍耐力把自己从地下道里挤了出来。他的实验白大褂已经成了黑色碎布，糊在他身上像一片被融化的塑料粘在树皮上。

但他口袋里的那张照片——在他离开这座被突袭的实验室之后——还留着他的触感。他会在北方某个无人知晓的废墟里，重新开始。这一次——他的实验数据只剩下了自己脑中记忆的那些，以及他口袋里的那张在十五年前永远凝固了的婚礼请柬草图——请柬正面画着一个小小的、手绘的不规则圆形。

title:"周敏的苏醒",
npc:"周敏",
text:`警方的突击小组进入了地下二层的囚室区域。陈队长走在最前面——他的手里拿着从林夜U盘里打印出来的受试者编号清单，沿着走廊一间一间地排查囚室。后面的特警队员们撞开了每一扇锁着的铁门，一声又一声的闷响在黑暗狭窄的走廊里回荡。

周敏在第三间囚室里。

铁门被撞开的时候，墙角的日光灯管亮了起来——不是自动的，是门上的连锁电路在暴力关闭之后触发了应急照明。灯光照亮了这间大约六平方米的囚室：一张金属床，一个简易的塑料水桶，墙壁上用铅笔画满了密密麻麻的标记——每一横代表一天。#72条横线。最下面的一条旁边画了一个小小的箭头——好像在说，我还在这里。

周敏蜷缩在床上。她的头发已经被实验药物的副作用摧残得接近灰白。手里的被子紧紧攥着，指甲裂开了——不是在床上挣扎时裂的，是在墙壁上反复划擦计数横线时磨损的。

她看到陈队长的时候——没有反应。看到苏晚的时候——也没有反应。她的眼睛是睁着的，但她的瞳孔——像是两个被迷雾覆盖过的透镜，光线进去了，但没有在视网膜上形成任何能识别出来的图像。

「姐姐。」苏晚跪在床前——她的膝盖撞在水泥地上的声音很硬，但她没有皱眉。她把周敏的手从被子上拿起来，放在自己的手心里。「是我。苏晚。你的妹妹。你记得吗——我们小时候一起在后院种过向日葵。每次下雨之后都要把它搬进棚子里——」

周敏眨了眨眼。然后她的嘴张开了——没有声音，只是嘴角的肌肉在颤动，像是想说一句话、但舌头和声带已经忘记了如何配合。

「姐——妈妈让我告诉你——她每天早晚都把你的那件墨绿色靠衣放在椅子上。她说你回来的时候穿上它就暖和了。」

周敏的身体突然颤动了一下。她的手从苏晚的手掌里翻过来——翻手，握紧——这是一个肌肉记忆的动作。她可能不记得为什么翻手会疼，但她的手还记得翻手之后握着另一只手的温度。

「我——」她的嘴唇张开——合上——又张开。声带发出了一个低沉的、像是从很深的井底传上来的声音：「——记得——向日葵。」

苏晚在此刻终于没有忍住。她低下头，额头抵着周敏冷得像金属一样的手指，整个肩膀都在颤抖。陈队长站在门口没有说话——他背对着她们，对着对讲机发了一条指令：「所有囚室已完成排查。请求医疗支援——受试者需紧急神经评估。」

在走廊的另一端，林夜站在那里。他没有进去。因为他不想再给她的记忆增加一张模糊的、随时会被药物抹去的脸。`,

title:"三个人的方向",
npc:"旁白",
text:`码头集装箱办公室里，三个人坐成了一圈——苏晚坐在那只从旧货船上搬下来的木箱上，陈队长坐在窗边那个堆满了旧消防地图的椅子上，林夜靠着墙壁站着，两只手环抱在胸前。

集装箱的铁皮墙上钉着一张巨大的白板——上面用黑红双色马克笔画满了树状图。树状图的主干是「K」，向三个方向分叉成三条不同颜色的粗线。

红色线——正面对抗：向检察院递交正式指控，配合媒体同步曝光，利用K在规划局会议上的公开露面执行公开抓捕。陈队长用红色线画了五个箭头，每一个箭头旁边都标注着需要配合的警力：「特警组×2 + 便衣×8 + 媒体联动×3」。

蓝色线——暗访取证：发稿但不报批，用深度新闻报道推动公众舆论，将证据以匿名方式提交给多家媒体，同时在国际刑警组织备案，让K的境外网络也受到监控。苏晚用蓝色线画了四个分支：「在规划局会议前匿名提交」，「确保多家媒体同步刊出」，「保留向国际组织举报的副本」，「在报道刊登之前保护林夜和周敏的人身安全」。

灰色线——与K合作，打入内部，从内部瓦解：接受K的提议，以工作身份深入了解C-11配方，以实验室内部文档为证据，从内部建立检举通道。灰色的支线最少——只有两条：「利用合作身份获取完整实验数据」，「在K的信任达到顶峰时从内部沟通警方」。

「三条路。」陈队长用马克笔敲着白板——笔尖留下了一个个不规则的小墨点，「每一条都能走。每一条都有不同的代价——不一样的结局。但选择的人是你。」

「为什么是我？」

「因为你现在是唯一一个同时拥有证据、了解地形、并且被K正眼看待的人。」苏晚说，「我不是——警察。我拿了证据也只能排队等内部审批。陈队也不是——他马上就要退休了。但你是。你是在这场棋局里处于最有利位置的棋子。你要做车——还是马——还是象——取决于你。」

林夜低头看着自己的手。就是这只手——握着周敏笔记本时感到了她指尖的冷。就是这只手——把方远的U盘从化工厂带到了地底深处。就是这只手——在没有灯光的排气管里把自己往上拽了一节又一节。

「我选对抗。但我需要你们两边的支持。苏晚——我需要你在K带走我之前发动警力。陈队——我需要你在检察院递交材料的同时把复印件交给其他媒体。不止我们一家——三家以上。不让任何一个人有借口装作没看到。」

苏晚和陈队长同时对望了一眼。然后苏晚站起来，把她的警用夹克从木箱上拿起来，抖了一下——上面的水珠飞溅，在空中形成了一瞬间的细小彩虹。

「那就这样。二十四小时后——我们在规划局门口。」`,

"node_46":{
title:"决断前夜",
npc:"旁白",
text:`决战前夜，林夜坐在出租屋的窗前，对着电脑屏幕上的证据清单发呆。窗外没有下雨——这是江城在连续大半个月的暴雨之后的第一个晴朗夜晚。夜空像一块被水洗了十几遍之后终于拧干的深蓝色抹布——挤得出几颗星星，但更多的是像棉絮一样一缕一缕残留在天上的灰色的云。

他的证据清单分为三列——名称、来源、在法庭上的可采性。

第一列：周敏的密码日记——来源：旧码头三号仓库皮箱——可采性：物证直接。
第二列：镜中人俱乐部会员名单照片——来源：俱乐部前台柜——可采性：旁证。
第三列：白小姐书房内的实验对象清单——来源：俱乐部VIP包厢——可采性：物证直接。
第四列：地下实验室受试者健康数据汇总——来源：B2层档案室——可采性：物证直接。
第五列：老刘的江大实验室爆炸调查档案——来源：报社资料室——可采性：旁证（非原始副本）。

五件证据。足够在任何一个法庭上推翻K的所有防御。

但林夜知道K不是那种会安安静静等着被审判的人。如果他被提前告上法庭，K会在被捕之前的二十四小时内销毁所有证据、转移所有实验对象、并且让所有愿意为他办事的人消失。那些穿白大褂的人会蒸发；那些保安会改名换姓去另一个省份继续做同样的工作；那些注射了M-724的受试者——会被注射吗啡，然后被塞进密封的集装箱，在海上的某个夜晚沉入水中，像从来没有存在过一样。

他需要的不是证据——是一个能让K没有时间销毁证据的时机。

陈队长说K明天下午会在规划局参加会议。明天下午——就是调查他的最佳窗口。林夜明天要去规划局——不是参加会议，是在会议现场做一个K完全没有预料到的事情。

他关了电脑。走到窗边。对面街道上有一个路灯坏了——一闪一闪地，把寂静的街道切割成明暗交替的片段。他站在那里看了一会儿——然后他把手伸进抽屉，拿出那支录音笔，按下录音键。

/* ========== 存档系统 ========== */
function saveGame(){
 try {
  var data = JSON.stringify(state);
  localStorage.setItem(SAVE_KEY, data);
  var si = document.getElementById("save-indicator");
  if(si){
   si.style.display = "inline";
   setTimeout(function(){ si.style.display = "none"; },1500);
  }
 } catch(e){
  console.error("[SaveGame] 存档失败:", e.message || e);
 }
}
function loadGame(){
 try {
  var data = localStorage.getItem(SAVE_KEY);
  if(!data) return null;
  var saved = JSON.parse(data);
  if(saved && saved.nodeId && G.nodes[saved.nodeId]){
   console.log("[LoadGame] 读取存档: nodeId=" + saved.nodeId + " clues=" + (saved.clues ? saved.clues.length : 0));
   return saved;
  }
  console.warn("[LoadGame] 存档数据无效, 清除");
  localStorage.removeItem(SAVE_KEY);
 } catch(e){
  console.error("[LoadGame] 读取存档失败:", e.message || e);
 }
 return null;
}
function clearSave(){
 try { localStorage.removeItem(SAVE_KEY); } catch(e){}
}
function hasSave(){
 return !!localStorage.getItem(SAVE_KEY);
}

/* ========== Canvas 粒子效果 ========== */
function initCanvas(){
 canvas = document.getElementById("bg-canvas");
 ctx = canvas.getContext("2d");
 resizeCanvas();
 window.addEventListener("resize",resizeCanvas);
 for(var i=0;i<60;i++){ particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.5+0.5,s:Math.random()*0.5+0.2,o:Math.random()*0.4+0.1}); }
 animateParticles();
}
function resizeCanvas(){
 var app=document.getElementById("app");
 var w=app.clientWidth;
 var h=app.clientHeight;
 canvas.width=w;
 canvas.height=h;
 canvas.style.width=w+"px";
 canvas.style.height=h+"px";
}
function animateParticles(){
 if(!canvas) return;
 ctx.clearRect(0,0,canvas.width,canvas.height);
 for(var i=0;i<particles.length;i++){
  var p=particles[i];
  p.y+=p.s;
  if(p.y>canvas.height){ p.y=0;p.x=Math.random()*canvas.width; }
  ctx.beginPath();
  ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
  ctx.fillStyle="rgba(255,255,255,"+p.o+")";
  ctx.fill();
 }
 requestAnimationFrame(animateParticles);
}

/* ========== 游戏逻辑 ========== */
function loadNode(nodeId){
 var node = G.nodes[nodeId];
 if(!node) return;
 state.nodeId = nodeId;
 if(state.history.indexOf(nodeId)<0) state.history.push(nodeId);
 /* 立即存档——确保节点切换即持久化，不依赖异步typeText回调 */
 saveGame();
 var ch = G.chapter[nodeId] || 1;
 document.getElementById("chapter-tag").textContent = "CHAPTER "+("0"+ch).slice(-2);
 if(node.isEnd){
  showEnding();
  return;
 }
 currentNpc = node.npc;
 currentText = node.text;
 showNpcName();
 typeText(node.text,function(){
  showChoices(node.choices);
  saveGame();
 });
}

function showNpcName(){
 var el = document.getElementById("npc-name");
 el.textContent = currentNpc;
 el.classList.add("show");
}

function typeText(text,callback){
 var el = document.getElementById("dialogue-text");
 el.textContent = "";
 el.classList.add("cursor-blink");
 isTyping = true;
 document.getElementById("dialogue-box").classList.add("typing");
 document.getElementById("typing-hint").style.display = "block";
 var i = 0;
 var speed = 25;
 function tick(){
  if(i<text.length){
   el.textContent += text.charAt(i);
   i++;
   var main = document.getElementById("main-area");
   main.scrollTop = main.scrollHeight;
   typingTimer = setTimeout(tick, text.charAt(i-1)==='\n' ? speed*3 : speed);
  } else {
   el.classList.remove("cursor-blink");
   isTyping = false;
   document.getElementById("dialogue-box").classList.remove("typing");
   document.getElementById("typing-hint").style.display = "none";
   if(callback) callback();
  }
 }
 tick();
}

function skipTyping(){
 if(!isTyping) return;
 clearTimeout(typingTimer);
 var el = document.getElementById("dialogue-text");
 el.textContent = currentText;
 el.classList.remove("cursor-blink");
 isTyping = false;
 document.getElementById("dialogue-box").classList.remove("typing");
 document.getElementById("typing-hint").style.display = "none";
 showChoices(G.nodes[state.nodeId].choices);
 saveGame();
}

function showChoices(choices){
 document.getElementById("clue-alert").style.display = "none";
 var area = document.getElementById("choices-area");
 area.innerHTML = "";
 if(!choices || choices.length===0) return;
 choices.forEach(function(c,i){
  var btn = document.createElement("button");
  btn.className = "choice-btn";
  btn.textContent = (i+1)+". "+c.text;
  btn.addEventListener("click",function(){
   makeChoice(c);
  });
  area.appendChild(btn);
 });
}

function makeChoice(choice){
 if(isTyping) return;
 state.lastChoice = choice.text;
 if(state.nodeId==="node_13"){
  if(choice.next==="node_14") state.route = "cooperate";
  else if(choice.next==="node_15") state.route = "resist";
  else if(choice.next==="node_16") state.route = "escape";
 }
 if(state.nodeId==="node_19"){
  if(choice.text.indexOf("公开")>=0) state.lastChoice = "公开";
  else if(choice.text.indexOf("接受")>=0) state.lastChoice = "接受";
  else state.lastChoice = "放弃";
 }
 if(choice.clue && state.clues.indexOf(choice.clue)<0){
  state.clues.push(choice.clue);
  var alert = document.getElementById("clue-alert");
  alert.textContent = "已获得线索：「"+choice.clue+"」";
  alert.style.display = "block";
 }
 document.getElementById("choices-area").innerHTML = "";
 updateClueCount();
 setTimeout(function(){ loadNode(choice.next); },300);
}

function updateClueCount(){
 document.getElementById("clue-count").textContent = "线索 "+state.clues.length;
}

 document.getElementById("choices-area").innerHTML = "";

document.getElementById("clue-count").addEventListener("click",showNotebook);
document.getElementById("notebook-close").addEventListener("click",hideNotebook);
document.getElementById("end-restart").addEventListener("click",restart);
document.getElementById("end-reset").addEventListener("click",resetAll);
document.getElementById("continue-yes").addEventListener("click",function(){
 var saved = loadGame();
 if(saved){ state = saved; }
 document.getElementById("continue-overlay").classList.remove("open");
 updateClueCount();
 loadNode(state.nodeId);
});
document.getElementById("continue-no").addEventListener("click",function(){
 clearSave();
 document.getElementById("continue-overlay").classList.remove("open");
 loadNode("node_1");
});

/* ========== 支持作者 ========== */
function toggleSupport() {
  var el = document.getElementById('supportOverlay');
  if (el) { el.classList.add('show'); document.body.style.overflow = 'hidden'; }
}

function closeSupport() {
  var el = document.getElementById('supportOverlay');
  if (el) { el.classList.remove('show'); document.body.style.overflow = ''; }
}

/* ========== 启动 ========== */
initCanvas();
var saved = loadGame();
if(saved){
 /* 先恢复 state 再更新 UI */
 state = saved;
 updateClueCount();
 /* 检查是否是结局存档 */
 if(G.nodes[saved.nodeId] && G.nodes[saved.nodeId].isEnd){
  showEnding();
 } else {
  showContinueDialog(saved);
 }
} else {
 loadNode("node_1");
}
})();
</script>
</body>
</html>
